<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">

  <!-- Open Graph / Telegram предпросмотр -->
  <meta property="og:title" content="Tanks Wars">
  <meta property="og:description" content="Браузерная игра про танки. Чейнджлог и документация проекта.">
  <meta property="og:image" content="https://gamestudio.su/tankswars/img/logo.png">
  <meta property="og:url" content="https://gamestudio.su/tankswars/update.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Tanks Wars">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">

  <!-- Twitter Card (тоже читается Telegram) -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Tanks Wars">
  <meta name="twitter:description" content="Браузерная игра про танки. Чейнджлог и документация проекта.">
  <meta name="twitter:image" content="https://gamestudio.su/tankswars/img/logo.png">

  <title>Tanks Wars · Changelog</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-page: #f0f4f1;
      --bg-card: #ffffff;
      --text-primary: #1e2b22;
      --text-secondary: #3d5243;
      --text-muted: #6b7d6f;
      --accent: #00ce42;
      --accent-soft: #c8f0d4;
      --accent-hover: #00b339;
      --border-light: #d8e6db;
      --border-strong: #b4ccb9;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
      --shadow-card: 0 8px 28px rgba(0,0,0,0.06);
      --radius-card: 20px;
      --radius-sm: 10px;
      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --font-serif: 'Lora', 'Georgia', 'Times New Roman', serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --line-height-text: 1.7;
    }

    body {
      background: var(--bg-page);
      font-family: var(--font-sans);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      margin: 0;
    }

    .page {
      width: 100%;
      max-width: 900px;
      background: var(--bg-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 2.2rem 2.5rem;
      border: 1px solid var(--border-light);
      margin-bottom: 2rem;
    }

    .page-header {
      text-align: left;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--accent-soft);
      padding-bottom: 1.2rem;
    }

    .page-header h1 {
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #1a2e1f;
      margin-bottom: 0.3rem;
      font-family: var(--font-sans);
    }

    .page-header .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      background: #e8f5eb;
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      border: 1px solid var(--accent-soft);
    }

    .markdown-body {
      font-family: var(--font-serif);
      font-size: 1.08rem;
      line-height: var(--line-height-text);
      color: var(--text-primary);
      word-wrap: break-word;
      max-width: 100%;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      font-family: var(--font-sans);
      font-weight: 550;
      color: #1a2e1f;
      margin-top: 2rem;
      margin-bottom: 0.8rem;
      letter-spacing: -0.3px;
      line-height: 1.3;
    }

    .markdown-body h1 {
      font-size: 2.2rem;
      font-weight: 600;
      border-bottom: 2px solid var(--accent-soft);
      padding-bottom: 0.5rem;
    }

    .markdown-body h2 {
      font-size: 1.7rem;
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
    }

    .markdown-body h3 {
      font-size: 1.35rem;
      color: #2a3d2e;
    }

    .markdown-body h4 {
      font-size: 1.15rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-secondary);
    }

    .markdown-body p {
      margin-bottom: 1.1rem;
    }

    .markdown-body strong {
      color: #1a3320;
      font-weight: 650;
    }

    .markdown-body em {
      color: #4a604f;
    }

    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1.5px dashed var(--accent-soft);
      transition: border 0.2s, color 0.2s;
    }

    .markdown-body a:hover {
      color: var(--accent-hover);
      border-bottom-color: var(--accent);
    }

    .markdown-body ul,
    .markdown-body ol {
      margin: 1rem 0 1.3rem 1.5rem;
      padding-left: 0.5rem;
    }

    .markdown-body li {
      margin-bottom: 0.35rem;
    }

    .markdown-body ul li::marker {
      color: var(--accent);
    }

    .markdown-body ol li::marker {
      color: var(--accent);
      font-weight: 600;
    }

    .markdown-body blockquote {
      margin: 1.6rem 0;
      padding: 1rem 1.5rem;
      background: #f2faf4;
      border-left: 4px solid var(--accent);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: #2e4233;
      font-style: italic;
    }

    .markdown-body blockquote p {
      margin-bottom: 0.3rem;
    }

    .markdown-body code {
      background: #e8f5eb;
      padding: 0.2rem 0.45rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.88rem;
      color: #008a2e;
      border: 1px solid #c8e6d0;
    }

    .markdown-body pre {
      background: #1e2b22;
      color: #d4f0dc;
      padding: 1.1rem 1.4rem;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 1.4rem 0;
      font-family: var(--font-mono);
      font-size: 0.88rem;
      line-height: 1.6;
      border: 1px solid #3a5340;
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      color: inherit;
      border: none;
      font-size: inherit;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: linear-gradient(to right, var(--border-strong), transparent);
      margin: 2rem 0;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.4rem 0;
      font-size: 0.95rem;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .markdown-body th {
      background: #eaf5ed;
      font-weight: 600;
      padding: 0.7rem 1rem;
      text-align: left;
      color: #253b2a;
      font-family: var(--font-sans);
    }

    .markdown-body td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border-light);
      background: #fff;
    }

    .markdown-body tr:last-child td {
      border-bottom: none;
    }

    .markdown-body img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
      margin: 1.1rem 0;
      border: 1px solid #d4e8d8;
    }

    .markdown-body small {
      color: #6b7d6f;
    }

    .error-message {
      text-align: center;
      padding: 3rem 1rem;
      color: #6b7d6f;
      font-family: var(--font-serif);
    }

    .error-message .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 650px) {
      body {
        padding: 1rem;
      }
      .page {
        padding: 1.5rem;
      }
      .markdown-body h1 {
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1>Tanks Wars</h1>
      <div class="subtitle" id="version-badge">загрузка...</div>
    </div>
    <div id="markdown-content" class="markdown-body">
      <div class="error-message">
        <div class="icon">📄</div>
        <p>Загрузка README.md...</p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const targetDiv = document.getElementById('markdown-content');
      const versionBadge = document.getElementById('version-badge');

      function extractVersion(mdText) {
        const match = mdText.match(/## Текущая версия\s*\n+\`([^\`]+)\`/);
        return match ? match[1] : null;
      }

      fetch('./README.md')
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }
          return response.text();
        })
        .then(mdText => {
          const version = extractVersion(mdText);
          if (version) {
            versionBadge.textContent = `текущая версия ${version}`;
          } else {
            versionBadge.textContent = 'версия не найдена';
          }

          if (typeof marked !== 'undefined') {
            marked.setOptions({
              breaks: false,
              gfm: true,
              headerIds: false,
              mangle: false,
              smartLists: true,
            });
            targetDiv.innerHTML = marked.parse(mdText);
          } else {
            throw new Error('Библиотека marked не загружена');
          }
        })
        .catch(error => {
          console.error('Ошибка загрузки README.md:', error);
          versionBadge.textContent = 'ошибка загрузки';
          targetDiv.innerHTML = `
            <div class="error-message">
              <div class="icon">⚠️</div>
              <p>Не удалось загрузить README.md</p>
              <p style="font-size:0.85rem;margin-top:0.5rem;">${error.message}</p>
              <p style="font-size:0.8rem;margin-top:1rem;color:#888;">
                Убедитесь, что файл README.md лежит в той же папке,<br>
                и страница открыта через HTTP-сервер (не file://).
              </p>
            </div>
          `;
        });
    })();
  </script>
</body>
</html>
