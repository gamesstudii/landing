<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tanks Wars</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --top-bar-height: 15vh;
      --left-panel-width: min(clamp(108px, 10vw, 156px), calc((100vh - var(--top-bar-height)) / 7));
      --tank-bar-height: calc((100vw - var(--left-panel-width)) / 8 * 9 / 16);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      cursor: url("./img/cursor.png") 16 16, auto;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    #hangarTank {
      position: absolute;
      left: 50%;
      top: 52%;
      width: min(46vw, 560px);
      height: min(32vh, 300px);
      transform: translateX(-50%);
      display: none;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
    }

    #statsPanel {
      position: absolute;
      top: var(--top-bar-height);
      right: 0;
      width: min(360px, 34vw);
      bottom: var(--tank-bar-height);
      padding: 72px 24px 28px;
      color: #ff1f1f;
      background: rgba(0, 0, 0, 0.62);
      display: none;
      align-items: flex-start;
      justify-content: flex-start;
      font-family: Tahoma, Arial, sans-serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    #sideButtons {
      position: absolute;
      top: var(--top-bar-height);
      left: 0;
      bottom: var(--tank-bar-height);
      width: var(--left-panel-width);
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      z-index: 3;
    }

    .sideButton {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 5px solid #000;
      background: #413f33;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sideButton:active {
      transform: scale(0.96);
    }

    .sideButtonIcon {
      width: 72%;
      height: 72%;
      object-fit: contain;
      pointer-events: none;
    }

    #screenOverlay {
      position: absolute;
      inset: 0;
      display: none;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    #screenOverlay.active {
      display: block;
    }

    #backButton {
      position: absolute;
      top: 20px;
      right: 20px;
      width: clamp(72px, 8vw, 128px);
      height: clamp(42px, 4vw, 64px);
      border: 4px solid #000;
      background: #413f33;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-size: clamp(16px, 1.5vw, 24px);
      font-weight: 700;
      cursor: pointer;
      z-index: 12;
    }

    #overlayContent {
      position: absolute;
      inset: var(--top-bar-height) 0 var(--tank-bar-height) var(--left-panel-width);
      padding: 24px;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      z-index: 11;
    }

    .overlayMessage {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(28px, 4vw, 64px);
      font-weight: 700;
      text-align: center;
    }

    .upgradeScreen {
      position: relative;
      height: 100%;
      display: grid;
      grid-template-columns: minmax(180px, 34%) 1fr;
      gap: clamp(28px, 6vw, 96px);
      align-items: center;
    }

    .upgradeSource,
    .upgradeTargets {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upgradeSource .tankSlot,
    .upgradeTarget .tankSlot {
      width: min(32vw, 360px);
      flex: 0 0 auto;
    }

    .upgradeTargets {
      height: 100%;
      flex-direction: column;
      align-items: stretch;
    }

    .upgradeTarget {
      flex: 1 1 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 100%;
    }

    .upgradePrice {
      min-width: 120px;
      color: #ff1f1f;
      font-size: clamp(16px, 1.4vw, 24px);
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
    }

    .upgradeLines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .storeScreen {
      height: 100%;
      overflow-y: auto;
      padding: clamp(12px, 2vw, 30px);
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(320px, 1.1fr);
      gap: 14px;
      align-content: start;
      color: #f1f1f1;
    }

    .storePanel {
      border: 3px solid #111;
      background: rgba(18, 18, 18, 0.86);
      padding: clamp(14px, 1.6vw, 22px);
    }

    .storeTitle {
      color: #ff1f1f;
      font-size: clamp(20px, 1.7vw, 30px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .storeText {
      color: #d8d8d8;
      font-size: clamp(13px, 1vw, 17px);
      line-height: 1.35;
      margin-bottom: 14px;
    }

    .storeActionButton {
      width: 100%;
      min-height: 54px;
      border: 3px solid #111;
      background: #413f33;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-size: clamp(17px, 1.35vw, 24px);
      font-weight: 700;
      cursor: pointer;
    }

    .storeActionButton:disabled {
      cursor: default;
      opacity: 0.55;
    }

    .storeContainerScene {
      width: min(280px, 58vw);
      height: min(230px, 42vh);
      position: relative;
      perspective: 820px;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    .storeContainerScene::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 72%;
      height: 18%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(0, 0, 0, 0.68), rgba(0, 0, 0, 0));
      filter: blur(8px);
      z-index: -1;
    }

    .storeContainer3d {
      position: relative;
      width: 170px;
      height: 118px;
      transform-style: preserve-3d;
      transform: rotateX(-18deg) rotateY(32deg);
      animation: containerIdle 2.4s ease-in-out infinite;
    }

    .storeContainerFace {
      position: absolute;
      border: 3px solid #151515;
      background: linear-gradient(135deg, #5f5a45, #2f332b);
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.08);
    }

    .storeContainerFront,
    .storeContainerBack {
      width: 170px;
      height: 118px;
    }

    .storeContainerFront {
      transform: translateZ(52px);
    }

    .storeContainerBack {
      transform: rotateY(180deg) translateZ(52px);
    }

    .storeContainerRight,
    .storeContainerLeft {
      width: 104px;
      height: 118px;
      left: 33px;
    }

    .storeContainerRight {
      transform: rotateY(90deg) translateZ(85px);
    }

    .storeContainerLeft {
      transform: rotateY(-90deg) translateZ(85px);
    }

    .storeContainerBottom {
      width: 170px;
      height: 104px;
      top: 7px;
      transform: rotateX(-90deg) translateZ(59px);
      background: linear-gradient(135deg, #24251e, #4d4a36);
    }

    .storeContainerLid {
      position: absolute;
      left: -8px;
      top: -18px;
      width: 186px;
      height: 42px;
      border: 3px solid #151515;
      background: linear-gradient(135deg, #797154, #373b2e);
      transform-origin: 50% 100%;
      transform: rotateX(0deg) translateZ(58px);
      transform-style: preserve-3d;
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.12);
    }

    .storeContainerGlow {
      position: absolute;
      width: 150px;
      height: 72px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(243, 210, 72, 0.9), rgba(255, 31, 31, 0.28), rgba(255, 255, 255, 0));
      transform: translateY(-38px) translateZ(38px);
      opacity: 0;
      filter: blur(10px);
      pointer-events: none;
    }

    .storeContainerParticle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      background: #f3d248;
      border-radius: 50%;
      opacity: 0;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px #f3d248;
    }

    .storeContainerScene.opening .storeContainer3d {
      animation: containerOpenShake 1.4s ease-in-out forwards;
    }

    .storeContainerScene.opening .storeContainerLid {
      animation: containerLidOpen 1.4s ease-in-out forwards;
    }

    .storeContainerScene.opening .storeContainerGlow {
      animation: containerGlow 1.4s ease-in-out forwards;
    }

    .storeContainerScene.opening .storeContainerParticle {
      animation: containerParticle 1.3s ease-out forwards;
      animation-delay: calc(var(--particle-index) * 0.045s + 0.25s);
    }

    .containerOpeningOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: #10100d;
      background-image: radial-gradient(circle at 50% 50%, rgba(243, 210, 72, 0.16), rgba(0, 0, 0, 0.68) 48%, rgba(0, 0, 0, 0.92)), url("./img/kont.png"), url("./img/angar.png");
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      z-index: 60;
      pointer-events: auto;
    }

    .containerOpeningOverlay::before,
    .containerOpeningOverlay::after {
      content: "";
      position: absolute;
      inset: -35%;
      pointer-events: none;
    }

    .containerOpeningOverlay::before {
      background: conic-gradient(from 0deg, rgba(243, 210, 72, 0), rgba(243, 210, 72, 0.16), rgba(255, 255, 255, 0), rgba(255, 31, 31, 0.12), rgba(243, 210, 72, 0));
      animation: containerRays 4s linear infinite;
      opacity: 0.75;
    }

    .containerOpeningOverlay::after {
      background: radial-gradient(circle, rgba(255, 255, 255, 0.22), rgba(243, 210, 72, 0.1) 24%, rgba(0, 0, 0, 0) 52%);
      animation: containerPulse 1.45s ease-in-out forwards;
    }

    .containerOpeningOverlay .storeContainerScene {
      width: min(680px, 90vw);
      height: min(560px, 80vh);
      z-index: 1;
      transform: scale(1.45);
      animation: containerSceneEnter 1.45s ease-in-out forwards;
    }

    .containerOpeningOverlay .storeContainerScene::before {
      bottom: 76px;
      width: 64%;
      height: 16%;
    }

    .containerOpeningReward {
      position: absolute;
      left: 50%;
      bottom: clamp(34px, 7vh, 92px);
      width: min(520px, 86vw);
      transform: translateX(-50%) translateY(34px) scale(0.92);
      opacity: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
      z-index: 2;
      animation: containerRewardReveal 0.48s ease-out forwards;
    }

    .containerOpeningRewardTitle {
      color: #f3d248;
      font-family: Tahoma, Arial, sans-serif;
      font-size: clamp(30px, 4vw, 58px);
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.96);
    }

    .containerOpeningRewardValue {
      color: #fff;
      font-family: Tahoma, Arial, sans-serif;
      font-size: clamp(20px, 2.2vw, 34px);
      font-weight: 700;
      line-height: 1.1;
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.96);
    }

    .containerOpeningReward .tankSlot {
      width: min(420px, 78vw);
      flex: 0 0 auto;
      filter: drop-shadow(0 18px 32px rgba(0, 0, 0, 0.65));
    }

    .containerOpeningContinue {
      min-width: min(260px, 78vw);
      min-height: 54px;
      border: 3px solid #111;
      background: #413f33;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-size: clamp(18px, 1.6vw, 26px);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.48);
    }

    @keyframes containerRewardReveal {
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }

    @keyframes containerRays {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes containerPulse {
      0% {
        opacity: 0.25;
        transform: scale(0.55);
      }

      58% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1.42);
      }
    }

    @keyframes containerSceneEnter {
      0% {
        opacity: 0;
        transform: scale(0.72) translateY(70px);
      }

      22% {
        opacity: 1;
      }

      100% {
        opacity: 1;
        transform: scale(1.45) translateY(0);
      }
    }

    @keyframes containerIdle {
      0%,
      100% {
        transform: rotateX(-18deg) rotateY(32deg) translateY(0);
      }

      50% {
        transform: rotateX(-16deg) rotateY(38deg) translateY(-8px);
      }
    }

    @keyframes containerOpenShake {
      0% {
        transform: rotateX(-18deg) rotateY(32deg) translateY(0) scale(1);
      }

      35% {
        transform: rotateX(-22deg) rotateY(46deg) translateY(-8px) scale(1.05);
      }

      65% {
        transform: rotateX(-12deg) rotateY(18deg) translateY(-14px) scale(1.08);
      }

      100% {
        transform: rotateX(-18deg) rotateY(32deg) translateY(0) scale(1);
      }
    }

    @keyframes containerLidOpen {
      0%,
      35% {
        transform: rotateX(0deg) translateZ(58px);
      }

      72%,
      100% {
        transform: rotateX(-118deg) translateZ(58px) translateY(-8px);
      }
    }

    @keyframes containerGlow {
      0%,
      28% {
        opacity: 0;
        transform: translateY(-18px) translateZ(38px) scale(0.55);
      }

      70% {
        opacity: 0.95;
        transform: translateY(-76px) translateZ(38px) scale(1.15);
      }

      100% {
        opacity: 0;
        transform: translateY(-108px) translateZ(38px) scale(1.55);
      }
    }

    @keyframes containerParticle {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.6);
      }

      25% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--particle-x)), calc(-50% + var(--particle-y))) scale(0.1);
      }
    }

    #battleView {
      position: absolute;
      inset: 0;
      display: none;
      background: #31412b;
      z-index: 20;
    }

    #battleCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #battleBackButton {
      position: absolute;
      top: 20px;
      right: 20px;
      width: clamp(72px, 8vw, 128px);
      height: clamp(42px, 4vw, 64px);
      border: 4px solid #000;
      background: #413f33;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-size: clamp(16px, 1.5vw, 24px);
      font-weight: 700;
      cursor: pointer;
      z-index: 21;
    }

    #battleAmmoPanel {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      display: none;
      gap: 8px;
      z-index: 21;
      font-family: Tahoma, Arial, sans-serif;
    }

    .battleAmmoSlot {
      width: clamp(86px, 8vw, 116px);
      min-height: 58px;
      border: 3px solid #111;
      background: rgba(18, 18, 18, 0.78);
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      font-weight: 700;
      text-align: center;
      line-height: 1.05;
    }

    .battleAmmoSlot.selected {
      border-color: #f3d248;
      box-shadow: inset 0 0 0 2px rgba(243, 210, 72, 0.42);
    }

    .battleAmmoKey {
      color: #f3d248;
      font-size: 13px;
    }

    .battleAmmoType {
      font-size: clamp(13px, 1vw, 16px);
      overflow-wrap: anywhere;
    }

    .battleAmmoDamage {
      color: #ff6c6c;
      font-size: clamp(14px, 1.1vw, 18px);
    }

    #reloadIndicator {
      position: absolute;
      left: 0;
      top: 0;
      min-width: 54px;
      padding: 5px 8px;
      border: 2px solid #111;
      background: rgba(0, 0, 0, 0.74);
      color: #42d75a;
      display: none;
      font-family: Tahoma, Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      pointer-events: none;
      z-index: 22;
    }

    #reloadIndicator.reloading {
      color: #ff3636;
    }

    #battleResult {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.42);
      color: #f4f4f4;
      font-family: Tahoma, Arial, sans-serif;
      font-weight: 700;
      text-align: center;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.9);
      z-index: 23;
      pointer-events: auto;
    }

    #battleResult.victory {
      color: #53e46a;
    }

    #battleResult.defeat {
      color: #ff4c4c;
    }

    .battleResultPanel {
      width: min(860px, 92vw);
      max-height: min(720px, 88vh);
      overflow-y: auto;
      border: 4px solid #111;
      background: rgba(18, 18, 18, 0.94);
      padding: clamp(18px, 3vw, 34px);
      color: #f1f1f1;
      text-align: left;
      text-shadow: none;
    }

    .battleResultTitle {
      color: inherit;
      font-size: clamp(38px, 5vw, 72px);
      line-height: 1;
      margin-bottom: 10px;
      text-align: center;
    }

    #battleResult.victory .battleResultTitle {
      color: #53e46a;
    }

    #battleResult.defeat .battleResultTitle {
      color: #ff4c4c;
    }

    .battleResultMode {
      color: #f3d248;
      font-size: clamp(14px, 1.3vw, 20px);
      margin-bottom: 22px;
      text-align: center;
    }

    .battleResultGrid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .battleResultStat {
      border: 2px solid #111;
      background: rgba(255, 255, 255, 0.06);
      padding: 12px;
    }

    .battleResultLabel {
      color: #cfcfcf;
      font-size: 13px;
      line-height: 1.15;
      margin-bottom: 7px;
    }

    .battleResultValue {
      color: #fff;
      font-size: clamp(22px, 2vw, 34px);
      line-height: 1;
    }

    .battleRewardRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 18px 0;
    }

    .battleReward {
      border: 3px solid #111;
      background: rgba(243, 210, 72, 0.12);
      padding: 14px;
    }

    .battleReward .battleResultValue {
      color: #f3d248;
    }

    .battleResultClose {
      width: 100%;
      min-height: 54px;
      border: 3px solid #111;
      background: #413f33;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-size: clamp(18px, 1.5vw, 26px);
      font-weight: 700;
      cursor: pointer;
    }

    #topBar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: var(--top-bar-height);
      padding: 0;
      background: #000;
      display: none;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0;
      z-index: 3;
    }

    .topSlot {
      aspect-ratio: 16 / 9;
      max-height: 100%;
      justify-self: center;
      align-self: center;
      width: 100%;
      border: 5px solid #ff1f1f;
      background: rgba(255, 255, 255, 0.04);
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-align: center;
      line-height: 1.05;
      overflow: hidden;
    }

    .topLabel {
      font-size: clamp(10px, 0.85vw, 14px);
    }

    .topValue {
      font-size: clamp(16px, 1.6vw, 28px);
    }

    .battleButton {
      cursor: pointer;
      font-size: clamp(18px, 2vw, 34px);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .battleButton:active {
      transform: scale(0.98);
    }

    .battleControlSlot {
      padding: 7px;
      gap: 7px;
    }

    .modeButton,
    .battleLaunchButton {
      width: 100%;
      border: 2px solid #111;
      background: rgba(65, 63, 51, 0.92);
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-weight: 700;
      cursor: pointer;
    }

    .modeButton {
      min-height: 24px;
      flex: 0 0 32%;
      font-size: clamp(10px, 0.85vw, 14px);
    }

    .battleLaunchButton {
      flex: 1 1 auto;
      font-size: clamp(18px, 2vw, 34px);
      text-transform: uppercase;
    }

    .modeScreen {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(14px, 2vw, 28px);
      align-items: stretch;
      padding: clamp(10px, 2vw, 30px);
    }

    .modeCard {
      border: 4px solid #111;
      background: rgba(18, 18, 18, 0.82);
      color: #f2f2f2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: pointer;
      text-align: left;
    }

    function setCookie(name, value, maxAgeDays = 365) {
      try {
        localStorage.setItem(name, String(value));
      } catch (error) {
        console.warn("Local storage is unavailable.", error);
      }

      const maxAge = maxAgeDays * 24 * 60 * 60;
      document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; max-age=${maxAge}; path=/; SameSite=Lax`;
    }

    function getCookie(name) {
      try {
        const storedValue = localStorage.getItem(name);

        if (storedValue !== null) {
          return storedValue;
        }
      } catch (error) {
        console.warn("Local storage is unavailable.", error);
      }

      const encodedName = `${encodeURIComponent(name)}=`;
      const cookies = document.cookie ? document.cookie.split("; ") : [];
      const cookie = cookies.find((item) => item.startsWith(encodedName));

      if (!cookie) {
        return "";
      }

      const cookieValue = decodeURIComponent(cookie.slice(encodedName.length));
      try {
        localStorage.setItem(name, cookieValue);
      } catch (error) {
        console.warn("Local storage is unavailable.", error);
      }

      return cookieValue;
    }

      const value = getCookie(name);

      if (!value) {
        return fallback;
      }

      try {
        return JSON.parse(value);
      } catch (error) {
        console.warn(`Could not load ${name}.`, error);
        return fallback;
      }
    }

    function createPlayerId() {
      const digits = [];

      digits.push(String(1 + Math.floor(Math.random() * 9)));

      while (digits.length < 16) {
        digits.push(String(Math.floor(Math.random() * 10)));
      }

      return digits.join("");
    }

    function loadPlayerProfile() {
      const storedProfile = parseStoredJson("playerProfile", {});
      const id = /^\d{16}$/.test(String(storedProfile.id || "")) ? String(storedProfile.id) : createPlayerId();
      const username = String(storedProfile.username || defaultPlayerProfile.username).trim().slice(0, 24) || defaultPlayerProfile.username;

      playerProfile = { username, id };
      savePlayerProfile();
    }

    function savePlayerProfile() {
      setCookie("playerProfile", JSON.stringify(playerProfile));
    }

    function loadPlayerStats() {
      const storedStats = parseStoredJson("playerStats", {});

      playerStats = {
        ...defaultPlayerStats,
        ...storedStats,
        battles: normalizeNumber(storedStats.battles),
        victories: normalizeNumber(storedStats.victories),
        defeats: normalizeNumber(storedStats.defeats),
        damage: normalizeNumber(storedStats.damage),
        kills: normalizeNumber(storedStats.kills),
        shots: normalizeNumber(storedStats.shots),
        hits: normalizeNumber(storedStats.hits),
        baseCapture: normalizeNumber(storedStats.baseCapture),
        experience: normalizeNumber(storedStats.experience),
        silver: normalizeNumber(storedStats.silver),
        tanks: storedStats.tanks && typeof storedStats.tanks === "object" ? storedStats.tanks : {}
      };
    }

    function savePlayerStats() {
      setCookie("playerStats", JSON.stringify(playerStats));
    }

    function normalizeNumber(value) {
      const number = Number.parseInt(value, 10);
      return Number.isFinite(number) && number > 0 ? number : 0;
    }

    function normalizePositiveFloat(value) {
      const number = Number.parseFloat(String(value).replace(",", "."));
      return Number.isFinite(number) && number > 0 ? number : 0;
    }

    function clampNumber(value, min, max) {
      const number = Number.parseFloat(String(value).replace(",", "."));

      if (!Number.isFinite(number)) {
        return min;
      }

      return Math.max(min, Math.min(max, number));
    }

    function toEightDigits(value) {
      return String(normalizeNumber(value)).padStart(8, "0").slice(-8);
    }

    function formatStoredNumber(value) {
      return String(normalizeNumber(value));
    }

    function loadGameSettings() {
      const storedSettings = getCookie("gameSettings");

      if (!storedSettings) {
        gameSettings = { ...defaultGameSettings };
        return;
      }

      try {
        const parsedSettings = JSON.parse(storedSettings);

        gameSettings = {
          ...defaultGameSettings,
          ...parsedSettings,
          showHealthBars: parsedSettings.showHealthBars !== false,
          showTeamMarkers: parsedSettings.showTeamMarkers !== false,
          showReloadIndicator: parsedSettings.showReloadIndicator !== false,
          showBattleResultPanel: parsedSettings.showBattleResultPanel !== false,
          fullscreen: parsedSettings.fullscreen === true
        };
      } catch (error) {
        console.warn("Could not load game settings.", error);
        gameSettings = { ...defaultGameSettings };
      }

      normalizeGameSettings();
    }

    function saveGameSettings() {
      setCookie("gameSettings", JSON.stringify(gameSettings));
    }

    function applyGameSettings() {
      const brightness = clampNumber(gameSettings.brightness, 60, 140);
      const contrast = clampNumber(gameSettings.contrast, 70, 140);
      const saturation = clampNumber(gameSettings.saturation, 60, 150);
      const uiScale = clampNumber(gameSettings.battleUiScale, 80, 130) / 100;

      battleCanvas.style.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
      battleAmmoPanel.style.transform = `translateX(-50%) scale(${uiScale})`;
      battleAmmoPanel.style.transformOrigin = "bottom center";
      reloadIndicator.style.fontSize = `${14 * uiScale}px`;
    }

    function getFullscreenElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || null;
    }

    function isFullscreenActive() {
      return getFullscreenElement() === game;
    }

    async function setFullscreenMode(enabled) {
      try {
        if (enabled) {
          if (isFullscreenActive()) {
            return true;
          }

          const requestFullscreen = game.requestFullscreen || game.webkitRequestFullscreen;

          if (!requestFullscreen) {
            return false;
          }

          await requestFullscreen.call(game);
          return true;
        }

        if (!getFullscreenElement()) {
          return true;
        }

        const exitFullscreen = document.exitFullscreen || document.webkitExitFullscreen;

        if (!exitFullscreen) {
          return false;
        }

        await exitFullscreen.call(document);
        return true;
      } catch (error) {
        console.warn("Fullscreen mode is unavailable.", error);
        return false;
      }
    }

    function getTankExperienceCookieName(tank) {
      return `tank_${tank.id}_exp`;
    }

    function getTankStateCookieName(tank) {
      return `tank_${tank.id}_state`;
    }

    function normalizeTankState(value, fallback = 0) {
      const state = Number.parseInt(value, 10);

      if ([0, 1, 2].includes(state)) {
        return state;
      }

      return fallback;
    }

    function loadPlayerResources() {
      playerResources.blueprints = normalizeNumber(getCookie("blueprints") || 0);
      playerResources.silver = normalizeNumber(getCookie("silver") || 10000);
      playerResources.gold = normalizeNumber(getCookie("gold") || 100);
      setCookie("blueprints", playerResources.blueprints);
      setCookie("silver", playerResources.silver);
      setCookie("gold", playerResources.gold);
    }

    function applyStoredTankExperience(tanks) {
      return tanks.map((tank, index) => {
        const tankWithId = {
          ...tank,
          id: tank.id || index + 1
        };
        const experienceCookieName = getTankExperienceCookieName(tankWithId);
        const stateCookieName = getTankStateCookieName(tankWithId);
        const storedExperience = getCookie(experienceCookieName);
        const storedState = getCookie(stateCookieName);
        const experience = storedExperience
          ? toEightDigits(storedExperience)
          : toEightDigits(tankWithId.experience || 0);
        const state = tankWithId.name === "\u041c\u0421-1"
          ? 2
          : normalizeTankState(storedState, tankWithId.state);

        setCookie(experienceCookieName, experience);
        setCookie(stateCookieName, state);

        return {
          ...tankWithId,
          experience,
          state
        };
      });
    }

    function parseCsvLine(line) {
      const cells = [];
      let cell = "";
      let insideQuotes = false;

      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        const nextChar = line[index + 1];

        if (char === "\"" && nextChar === "\"") {
          cell += "\"";
          index += 1;
          continue;
        }

        if (char === "\"") {
          insideQuotes = !insideQuotes;
          continue;
        }

        if (char === "," && !insideQuotes) {
          cells.push(cell.trim());
          cell = "";
          continue;
        }

        cell += char;
      }

      cells.push(cell.trim());
      return cells;
    }

    function parseTankRows(csvText) {
      return csvText
        .trim()
        .split(/\r?\n/)
        .filter(Boolean)
        .map((line, index) => {
          const cells = parseCsvLine(line);

          return {
            id: index + 1,
            name: (cells[0] || "").replace(/^\uFEFF/, ""),
            level: cells[7] || "",
            nation: cells[8] || "",
            experience: "00000000",
            state: index === 0 ? 2 : 0,
            containerEligible: normalizeNumber(cells[29] || 0) === 2,
            health: normalizeNumber(cells[15] || 0),
            reloadTime: normalizePositiveFloat(cells[16] || 0),
            hullTurnDelay: normalizePositiveFloat(cells[17] || 0),
            movementDelay: normalizePositiveFloat(cells[18] || 0),
            penetration: {
              "\u0411\u0411": normalizeNumber(cells[19] || 0),
              "\u041a\u0421": normalizeNumber(cells[20] || 0),
              "\u041e\u0424": normalizeNumber(cells[21] || 0),
              "\u041f\u0411": normalizeNumber(cells[22] || 0)
            },
            averageArmor: normalizeNumber(cells[23] || 0),
            penetrationChance: normalizeNumber(cells[24] || 0),
            gunType: normalizeNumber(cells[25] || 1) || 1,
            shellsPerShot: Math.max(1, normalizeNumber(cells[26] || 1) || 1),
            clipSize: normalizeNumber(cells[27] || 0),
            gunSpreadDegrees: normalizePositiveFloat(cells[28] || 0),
            shells: [
              { type: cells[1] || "", damage: normalizeNumber(cells[4] || 0) },
              { type: cells[2] || "", damage: normalizeNumber(cells[5] || 0) },
              { type: cells[3] || "", damage: normalizeNumber(cells[6] || 0) }
            ].filter((shell) => shell.type || shell.damage > 0),
            researchTargets: [cells[9], cells[10], cells[11]].filter(Boolean),
            researchExperiencePrice: normalizeNumber(cells[12] || 0),
            researchSilverPrice: normalizeNumber(cells[13] || 0),
            className: (cells[14] || "").trim().toUpperCase()
          };
        })
        .filter((tank) => tank.name);
    }

    function countReplacementCharacters(value) {
      return (value.match(/\uFFFD/g) || []).length;
    }

    function decodeCsvBuffer(csvBuffer) {
      const utf8Text = new TextDecoder("utf-8").decode(csvBuffer);
      const windows1251Text = new TextDecoder("windows-1251").decode(csvBuffer);

      return countReplacementCharacters(utf8Text) <= countReplacementCharacters(windows1251Text)
        ? utf8Text
        : windows1251Text;
    }

    function toRoman(value) {
      const number = Number.parseInt(value, 10);
      const romanLevels = {
        1: "I",
        2: "II",
        3: "III",
        4: "IV",
        5: "V",
        6: "VI",
        7: "VII",
        8: "VIII",
        9: "IX",
        10: "X"
      };

      return romanLevels[number] || "";
    }

    function formatNationFileName(nation) {
      const normalizedNation = nation.trim().toLowerCase();
      const nationFiles = {
        "\u0441\u0441\u0441\u0440": "sssr",
        "\u0432\u0435\u043b\u0438\u043a\u043e\u0431\u0440\u0438\u0442\u0430\u043d\u0438\u044f": "uk",
        "\u0430\u043d\u0433\u043b\u0438\u044f": "uk",
        "\u043f\u043e\u043b\u044c\u0448\u0430": "poland",
        "\u0433\u0435\u0440\u043c\u0430\u043d\u0438\u044f": "germany",
        "\u0441\u0448\u0430": "usa",
        "\u0444\u0440\u0430\u043d\u0446\u0438\u044f": "france",
        "\u043a\u0438\u0442\u0430\u0439": "china",
        "\u044f\u043f\u043e\u043d\u0438\u044f": "japan",
        "\u0447\u0435\u0445\u043e\u0441\u043b\u043e\u0432\u0430\u043a\u0438\u044f": "czechoslovakia",
        "\u0447\u0435\u0445\u0438\u044f": "czech",
        "\u0448\u0432\u0435\u0446\u0438\u044f": "sweden",
        "\u0438\u0442\u0430\u043b\u0438\u044f": "italy",
        "\u043C\u0438\u0440\u043E\u0432\u0430\u044F\u043D\u0430\u0446\u0438\u044F": "mirovayanacia"
      };

      if (nationFiles[normalizedNation]) {
        return nationFiles[normalizedNation];
      }

      return normalizedNation
        .replace(/\s+/g, "_")
        .replace(/[^a-z0-9_-]/g, "");
    }

    async function loadTankRows() {
      try {
        const response = await fetch("./data.csv", { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`CSV loading failed: ${response.status}`);
        }

        const csvBuffer = await response.arrayBuffer();
        const csvText = decodeCsvBuffer(csvBuffer);
        return applyStoredTankExperience(parseTankRows(csvText));
      } catch (error) {
        console.error(error);
        return applyStoredTankExperience(fallbackTanks);
      }
    }

    function selectTankCard(card, tank) {
      document
        .querySelectorAll(".tankCard.selected")
        .forEach((selectedCard) => selectedCard.classList.remove("selected"));

      card.classList.add("selected");
      selectTank(tank);
    }

    function selectTank(tank) {
      selectedTank = tank;
      statsPanel.textContent = tank.name;
      setTankImage(hangarTank, tank.name);
      renderTopBar();
    }

    function setTankImage(image, tankName) {
      delete image.dataset.fallbackLoaded;
      image.src = `./${tankName}.png`;
      image.onerror = () => {
        if (image.dataset.fallbackLoaded) {
          image.removeAttribute("src");
          return;
        }

        image.dataset.fallbackLoaded = "true";
        image.src = `./img/${tankName}.png`;
      };
    }

    function createTankCard(tank, selected = false, onSelect = null) {
      const card = document.createElement("article");
      const level = document.createElement("div");
      const tankImage = document.createElement("img");
      const name = document.createElement("div");
      const nationFileName = formatNationFileName(tank.nation);
      const activateCard = () => {
        if (onSelect) {
          onSelect(card, tank);
          return;
        }

        selectTankCard(card, tank);
      };

      card.className = "tankCard";
      card.tabIndex = 0;
      level.className = "tankLevel";
      tankImage.className = "tankImage";
      tankImage.alt = "";
      setTankImage(tankImage, tank.name);
      name.className = "tankName";
      level.textContent = toRoman(tank.level);
      name.textContent = tank.name;

      if (nationFileName) {
        card.style.backgroundImage = `url("./img/${nationFileName}.png"), url("./${nationFileName}.png")`;
      }

      card.append(level, tankImage, name);
      card.addEventListener("click", activateCard);
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          activateCard();
        }
      });

      if (selected) {
        card.classList.add("selected");
      }

      return card;
    }

    function renderTankBar(tanks) {
      tankBar.textContent = "";
      tankBar.scrollLeft = 0;

      tanks
        .filter((tank) => tank.state === 2)
        .forEach((tank) => {
          const slot = document.createElement("div");

          slot.className = "tankSlot";
          slot.append(createTankCard(tank, tank.id === selectedTank?.id));
          tankBar.append(slot);
        });
    }

    function createTankSlot(tank, selected = false, onSelect = null) {
      const slot = document.createElement("div");

      slot.className = "tankSlot";
      slot.append(createTankCard(tank, selected, onSelect));
      return slot;
    }

    function findResearchTarget(value) {
      const targetId = normalizeNumber(value);

      if (targetId > 0) {
        return findTankById(targetId);
      }

      const targetName = normalizeTankName(value);
      return loadedTanks.find((tank) => normalizeTankName(tank.name) === targetName);
    }

    function normalizeTankName(value) {
      return String(value)
        .trim()
        .toLowerCase()
        .replace(/\u0451/g, "\u0435")
        .replace(/\s+/g, " ");
    }

    function findLoadedTankByReference(tank) {
      if (!tank) {
        return null;
      }

      return findTankById(tank.id)
        || loadedTanks.find((loadedTank) => normalizeTankName(loadedTank.name) === normalizeTankName(tank.name))
        || tank;
    }

    function getResearchPrice(targetTank) {
      if (targetTank.state === 2) {
        return "";
      }

      if (targetTank.state === 1) {
        if (targetTank.researchSilverPrice) {
          return `${formatStoredNumber(targetTank.researchSilverPrice)} серебра`;
        }

        return targetTank.researchExperiencePrice
          ? `${formatStoredNumber(targetTank.researchExperiencePrice)} опыта`
          : "";
      }

      if (targetTank.researchExperiencePrice) {
        return `${formatStoredNumber(targetTank.researchExperiencePrice)} опыта`;
      }

      return targetTank.researchSilverPrice
        ? `${formatStoredNumber(targetTank.researchSilverPrice)} серебра`
        : "";
    }

    function saveTankExperience(tank) {
      setCookie(getTankExperienceCookieName(tank), tank.experience);
    }

    function saveTankState(tank) {
      setCookie(getTankStateCookieName(tank), tank.state);
    }

    function savePlayerResources() {
      setCookie("blueprints", playerResources.blueprints);
      setCookie("silver", playerResources.silver);
      setCookie("gold", playerResources.gold);
    }

    function rerenderUpgradeScreen() {
      overlayContent.textContent = "";
      renderUpgradeScreen();
      renderTopBar();
      renderTankBar(loadedTanks);
    }

    function selectTankFromUpgrade(tank) {
      const sourceTank = findLoadedTankByReference(selectedTank);
      const targetTank = findLoadedTankByReference(tank);

      if (targetTank.state === 0) {
        const price = targetTank.researchExperiencePrice;
        const sourceExperience = normalizeNumber(sourceTank.experience);

        if (!price || sourceExperience < price) {
          console.warn("Not enough experience.");
          return;
        }

        sourceTank.experience = toEightDigits(sourceExperience - price);
        targetTank.state = 1;
        saveTankExperience(sourceTank);
        saveTankState(targetTank);
        selectedTank = sourceTank;
        rerenderUpgradeScreen();
        return;
      }

      if (targetTank.state === 1) {
        const price = targetTank.researchSilverPrice;

        if (!price || playerResources.silver < price) {
          console.warn("Not enough silver.");
          return;
        }

        playerResources.silver -= price;
        targetTank.state = 2;
        savePlayerResources();
        saveTankState(targetTank);
        selectTank(targetTank);
        closeOverlay();
        renderTankBar(loadedTanks);
        return;
      }

      selectTank(tank);
      closeOverlay();
      renderTankBar(loadedTanks);
    }

    function drawUpgradeLines(screen) {
      const svg = screen.querySelector(".upgradeLines");
      const sourceCard = screen.querySelector(".upgradeSource .tankCard");
      const targetCards = [...screen.querySelectorAll(".upgradeTarget .tankCard")];

      svg.textContent = "";

      if (!sourceCard || targetCards.length === 0) {
        return;
      }

      const screenRect = screen.getBoundingClientRect();
      const sourceRect = sourceCard.getBoundingClientRect();
      const sourceX = sourceRect.right - screenRect.left;
      const sourceY = sourceRect.top + sourceRect.height / 2 - screenRect.top;

      targetCards.forEach((targetCard) => {
        const targetRect = targetCard.getBoundingClientRect();
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

        line.setAttribute("x1", sourceX);
        line.setAttribute("y1", sourceY);
        line.setAttribute("x2", targetRect.left - screenRect.left);
        line.setAttribute("y2", targetRect.top + targetRect.height / 2 - screenRect.top);
        line.setAttribute("stroke", "#000");
        line.setAttribute("stroke-width", "6");
        line.setAttribute("stroke-linecap", "round");
        svg.append(line);
      });
    }

    function renderUpgradeScreen() {
      const screen = document.createElement("div");
      const lines = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      const source = document.createElement("div");
      const targets = document.createElement("div");
      const sourceTank = findLoadedTankByReference(selectedTank);
      const targetTanks = (sourceTank?.researchTargets || [])
        .map(findResearchTarget)
        .filter(Boolean);

      screen.className = "upgradeScreen";
      lines.classList.add("upgradeLines");
      source.className = "upgradeSource";
      targets.className = "upgradeTargets";

      source.append(createTankSlot(sourceTank, true));

      if (targetTanks.length === 0) {
        const message = document.createElement("div");

        message.className = "overlayMessage";
        message.textContent = loadedTanks.length <= fallbackTanks.length
          ? "data.csv не загружен"
          : "Нет доступных улучшений";
        targets.append(message);
      } else {
        targetTanks.forEach((targetTank) => {
          const target = document.createElement("div");
          const price = document.createElement("div");

          target.className = "upgradeTarget";
          price.className = "upgradePrice";
          price.textContent = getResearchPrice(targetTank);
          target.append(
            createTankSlot(targetTank, targetTank.id === selectedTank.id, () => selectTankFromUpgrade(targetTank)),
            price
          );
          targets.append(target);
        });
      }

      screen.append(lines, source, targets);
      overlayContent.append(screen);
      requestAnimationFrame(() => drawUpgradeLines(screen));
    }

    function renderEventsScreen() {
      const message = document.createElement("div");

      message.className = "overlayMessage";
      message.textContent = "ивентов сегодня нету";
      overlayContent.append(message);
    }

    function getContainerTankPool() {
      return loadedTanks.filter((tank) => tank.containerEligible);
    }

    function pickRandomItem(items) {
      return items[Math.floor(Math.random() * items.length)] || null;
    }

    function createContainerResourceReward() {
      if (Math.random() < 0.5) {
        return {
          type: "gold",
          amount: 50 + Math.floor(Math.random() * 4) * 25
        };
      }

      return {
        type: "blueprints",
        amount: 5 + Math.floor(Math.random() * 6) * 5
      };
    }

    function getRewardTitle(reward) {
      if (reward.type === "tank") {
        return reward.wasOwned ? "\u0422\u0430\u043d\u043a \u0443\u0436\u0435 \u0432 \u0430\u043d\u0433\u0430\u0440\u0435" : "\u041d\u043e\u0432\u044b\u0439 \u0442\u0430\u043d\u043a";
      }

      return reward.type === "gold" ? "\u0417\u043e\u043b\u043e\u0442\u043e" : "\u0427\u0435\u0440\u0442\u0435\u0436\u0438";
    }

    function getRewardValue(reward) {
      if (reward.type === "tank") {
        const compensation = reward.compensationGold
          ? `, \u043a\u043e\u043c\u043f\u0435\u043d\u0441\u0430\u0446\u0438\u044f +${formatStoredNumber(reward.compensationGold)} \u0437\u043e\u043b\u043e\u0442\u0430`
          : "";

        return `${toRoman(reward.tank.level)} ${reward.tank.name}${compensation}`;
      }

      return `+${formatStoredNumber(reward.amount)}`;
    }

    function createStoreContainerScene(opening = false) {
      const scene = document.createElement("div");

      const faceNames = ["Front", "Back", "Right", "Left", "Bottom"];
      const lid = document.createElement("div");
      const glow = document.createElement("div");

      container.className = "storeContainer3d";
      faceNames.forEach((faceName) => {

        container.append(face);
      });
      lid.className = "storeContainerLid";
      glow.className = "storeContainerGlow";

        const particle = document.createElement("div");

        particle.className = "storeContainerParticle";
        particle.style.setProperty("--particle-index", index);
        particle.style.setProperty("--particle-x", `${Math.cos(angle) * distance}px`);
        particle.style.setProperty("--particle-y", `${Math.sin(angle) * distance - 76}px`);
        scene.append(particle);
      }

      return scene;

    function showContainerOpeningScene() {
      const openingOverlay = document.createElement("section");

      openingOverlay.className = "containerOpeningOverlay";
      openingOverlay.setAttribute("aria-hidden", "true");
      openingOverlay.append(createStoreContainerScene(true));
      game.append(openingOverlay);
      return openingOverlay;
    }

    function showContainerOpeningReward(openingOverlay, reward, onClose) {
      const rewards = Array.isArray(reward) ? reward : [reward];
      const rewardElement = document.createElement("div");

    function openContainer(button) {
      if (playerResources.gold < containerGoldPrice) {
        button.textContent = "\u041d\u0435 \u0445\u0432\u0430\u0442\u0430\u0435\u0442 \u0437\u043e\u043b\u043e\u0442\u0430";
        window.setTimeout(() => {
          button.textContent = `\u041e\u0442\u043a\u0440\u044b\u0442\u044c: ${formatStoredNumber(containerGoldPrice)} \u0437\u043e\u043b\u043e\u0442\u0430`;
        }, 900);
        return;
      }

      const tankPool = getContainerTankPool();
      const roll = Math.random();
      let reward = null;

      button.disabled = true;
      playerResources.gold -= containerGoldPrice;
      savePlayerResources();
      renderTopBar();
      const openingOverlay = showContainerOpeningScene();

      if (tankPool.length > 0 && roll < containerTankDropChance) {
        const tank = pickRandomItem(tankPool);
        const wasOwned = tank.state === 2;
        const compensationGold = wasOwned ? duplicateTankGoldReward : 0;

        tank.state = 2;
        saveTankState(tank);
        selectedTank = tank;
        playerResources.gold += compensationGold;
        reward = { type: "tank", tank, wasOwned, compensationGold };
      } else {
        reward = Array.from({ length: containerPrizeCount }, createContainerResourceReward);

        reward.forEach((item) => {
          if (item.type === "gold") {
            playerResources.gold += item.amount;
          } else if (item.type === "blueprints") {
            playerResources.blueprints += item.amount;
          }
        });
      }

      window.setTimeout(() => {
        savePlayerResources();
        refreshSelectedTank();
        renderTopBar();
        renderTankBar(loadedTanks);
        showContainerOpeningReward(openingOverlay, reward, () => {
          button.disabled = playerResources.gold < containerGoldPrice;
        });
      }, 1450);
    }

    function initTabActivityCheck() {
      if (tabActivityCheckInitialized) {
        return;
      }

      tabActivityCheckInitialized = true;

      document.addEventListener("visibilitychange", handleVisibilityChange);
      document.addEventListener("focus", () => updateStatus(true));
      document.addEventListener("blur", () => updateStatus(false));

      function handleVisibilityChange() {
        updateStatus(!document.hidden);
      }

      function updateStatus(active) {
        if (active && window.ysdk) {
          window.ysdk.features.LoadingAPI?.ready();
        }

        console.log("\u0421\u0442\u0430\u0442\u0443\u0441 \u0432\u043a\u043b\u0430\u0434\u043a\u0438:", active ? "\u0410\u043a\u0442\u0438\u0432\u043d\u0430" : "\u041d\u0435\u0430\u043a\u0442\u0438\u0432\u043d\u0430");
      }

      updateStatus(!document.hidden);
    }

    function initializeYandexGamesSdk() {
      if (yandexSdkPromise) {
        return yandexSdkPromise;
      }

      yandexSdkPromise = new Promise((resolve, reject) => {
        const initSdk = () => {
          if (!window.YaGames) {
            reject(new Error("Yandex Games SDK is unavailable."));
            return;
          }

          window.YaGames
            .init()
            .then((ysdk) => {
              console.log("Yandex SDK initialized");
              window.ysdk = ysdk;
              window.lang = ysdk.environment.i18n.lang;
              initTabActivityCheck();
              resolve(ysdk);
            })
            .catch(reject);
        };

        if (window.YaGames) {
          initSdk();
          return;
        }

        const script = document.createElement("script");

        script.src = "/sdk.js";
        script.async = true;
        script.onload = initSdk;
        script.onerror = () => reject(new Error("Could not load Yandex Games SDK."));
        document.head.append(script);
      });

      yandexSdkPromise.catch((error) => {
        yandexSdkPromise = null;
        console.error(error);
      });
      return yandexSdkPromise;
    }

    function showRewardedGoldAd(button) {
      button.disabled = true;
      button.textContent = "\u0417\u0430\u0433\u0440\u0443\u0437\u043a\u0430 \u0440\u0435\u043a\u043b\u0430\u043c\u044b...";

      return initializeYandexGamesSdk()
        .then((ysdk) => new Promise((resolve, reject) => {
          if (!ysdk.adv?.showRewardedVideo) {
            reject(new Error("Rewarded video is unavailable."));
            return;
          }

          ysdk.adv.showRewardedVideo({
            callbacks: {
              onOpen: () => {
                console.log("Video ad open.");
              },
              onRewarded: () => {
                console.log("Rewarded!");
                playerResources.gold += adGoldReward;
                savePlayerResources();
                renderTopBar();
                resolve();
              },
              onClose: () => {
                console.log("Video ad closed.");
                resolve();
              },
              onError: (error) => {
                console.log("Error while open video ad:", error);
                reject(error);
              }
            }
          });
        }))
        .catch((error) => {
          console.warn("Rewarded ad is unavailable.", error);
        })
        .finally(() => {
          button.disabled = false;
          button.textContent = `\u0417\u043e\u043b\u043e\u0442\u043e \u0437\u0430 \u0440\u0435\u043a\u043b\u0430\u043c\u0443: +${adGoldReward}`;

    function getProfileSummary() {
      const ownedTanks = loadedTanks.filter((tank) => tank.state === 2);
      const researchedTanks = loadedTanks.filter((tank) => tank.state >= 1);
      const totalTanks = loadedTanks.length || fallbackTanks.length;
      const winRate = playerStats.battles > 0 ? Math.round(playerStats.victories / playerStats.battles * 100) : 0;
      const accuracy = playerStats.shots > 0 ? Math.round(playerStats.hits / playerStats.shots * 100) : 0;
      const averageDamage = playerStats.battles > 0 ? Math.round(playerStats.damage / playerStats.battles) : 0;
      const bestTank = [...ownedTanks].sort((first, second) => normalizeNumber(second.experience) - normalizeNumber(first.experience))[0] || selectedTank;
      const tankClassCounts = ownedTanks.reduce((counts, tank) => {
        const className = tank.className || "\u0411\u0435\u0437 \u043a\u043b\u0430\u0441\u0441\u0430";

        counts[className] = normalizeNumber(counts[className]) + 1;
        return counts;
      }, {});

      return {
        ownedTanks,
        researchedTanks,
        totalTanks,
        winRate,
        accuracy,
        averageDamage,
        bestTank,
        tankClassCounts
      };
    }

    function getPlayerRank(summary) {
      const score = playerStats.victories * 3 + playerStats.kills + Math.floor(playerStats.damage / 800) + summary.ownedTanks.length;

      if (score >= 90) {
        return "\u041c\u0430\u0439\u043e\u0440";
      }

      if (score >= 50) {
        return "\u041a\u0430\u043f\u0438\u0442\u0430\u043d";
      }

      if (score >= 25) {
        return "\u041b\u0435\u0439\u0442\u0435\u043d\u0430\u043d\u0442";
      }

      if (score >= 8) {
        return "\u0421\u0435\u0440\u0436\u0430\u043d\u0442";
      }

      return "\u041d\u043e\u0432\u043e\u0431\u0440\u0430\u043d\u0435\u0446";
    }

    function normalizeGameSettings() {
      settingsControls.forEach((control) => {
        gameSettings[control.id] = clampNumber(gameSettings[control.id], control.min, control.max);
      });
      settingsToggles.forEach((toggle) => {
        gameSettings[toggle.id] = gameSettings[toggle.id] !== false;
      });
    }

    function formatSettingValue(control) {
      const value = gameSettings[control.id];
      const roundedValue = Number.isInteger(control.step) ? Math.round(value) : Number(value).toFixed(2).replace(/\.?0+$/, "");

      return `${roundedValue}${control.suffix || ""}`;
    }

    function createSettingsItem(control) {
      const item = document.createElement("label");
      const name = document.createElement("div");
      const value = document.createElement("div");
      const description = document.createElement("div");
      const input = document.createElement("input");

      item.className = "settingsItem";
      name.className = "settingsName";
      value.className = "settingsValue";
      description.className = "settingsDescription";
      input.className = "settingsControl";
      input.type = "range";
      input.min = control.min;
      input.max = control.max;
      input.step = control.step;
      input.value = gameSettings[control.id];
      name.textContent = control.label;
      value.textContent = formatSettingValue(control);
      description.textContent = control.description;
      input.addEventListener("input", () => {
        gameSettings[control.id] = clampNumber(input.value, control.min, control.max);
        value.textContent = formatSettingValue(control);
        saveGameSettings();
        applyGameSettings();
      });
      item.append(name, value, description, input);
      return item;
    }

    function createSettingsToggle(toggle) {
      const item = document.createElement("label");
      const name = document.createElement("div");
      const input = document.createElement("input");
      const description = document.createElement("div");

      item.className = "settingsItem";
      name.className = "settingsName";
      input.className = "settingsCheckbox";
      description.className = "settingsDescription";
      input.type = "checkbox";
      input.dataset.settingId = toggle.id;
      input.checked = toggle.id === "fullscreen" ? isFullscreenActive() : Boolean(gameSettings[toggle.id]);
      name.textContent = toggle.label;
      description.textContent = toggle.description;
      input.addEventListener("change", async () => {
        if (toggle.id === "fullscreen") {
          const enabled = await setFullscreenMode(input.checked);

          input.checked = isFullscreenActive();
          gameSettings.fullscreen = input.checked;
          saveGameSettings();

          if (!enabled && input.checked) {
            input.checked = false;
            gameSettings.fullscreen = false;
            saveGameSettings();
          }

          return;
        }

        gameSettings[toggle.id] = input.checked;
        saveGameSettings();
        applyGameSettings();
      });
      item.append(name, input, description);
      return item;
    }

    function findTankById(id) {

    function getDeveloperTankData(id = developerTankId) {
      const tank = findTankById(id);

      if (!tank) {
        return null;
      }

      return {
        id: tank.id,
        name: tank.name,
        level: tank.level,
        nation: tank.nation,
        className: tank.className,
        experience: tank.experience,
        state: tank.state
      };
    }

    function logDeveloperTank(id = developerTankId) {
      const tankData = getDeveloperTankData(id);

      if (!tankData) {
        console.warn(`Tank with id = ${normalizeNumber(id)} was not found.`);
        if (loadedTanks.length <= fallbackTanks.length) {
          console.warn("data.csv is not loaded. Open the game through hosting/server with data.csv next to index.html.");
        }
        return null;
      }

      console.table(tankData);
      return tankData;
    }

    function requireDeveloperMode(commandName) {
      if (developerModeEnabled) {
        return true;
      }

      console.warn(`Developer mode is disabled. Enter first: dev("${developerModeKey}")`);
      return false;
    }

    function setDeveloperResource(resourceName, value) {
      if (!requireDeveloperMode(resourceName)) {
        return;
      }

      playerResources[resourceName] = normalizeNumber(value);
      setCookie(resourceName, playerResources[resourceName]);
      renderTopBar();
      console.log(`${resourceName} = ${playerResources[resourceName]}`);
    }

    function setDeveloperTankValue(valueName, value) {
      if (!requireDeveloperMode(valueName)) {
        return;
      }

      const tank = findTankById(developerTankId);

      if (!tank) {
        console.warn(`Tank with id = ${developerTankId} was not found.`);
        if (loadedTanks.length <= fallbackTanks.length) {
          console.warn("data.csv is not loaded. Open the game through hosting/server with data.csv next to index.html.");
        }
        return;
      }

      if (valueName === "state") {
        tank.state = tank.name === "\u041c\u0421-1" ? 2 : normalizeTankState(value, tank.state);
        setCookie(getTankStateCookieName(tank), tank.state);
      }

      if (valueName === "experience") {
        tank.experience = toEightDigits(value);
        setCookie(getTankExperienceCookieName(tank), tank.experience);
      }

      if (selectedTank?.id === tank.id) {
        selectedTank = tank;
      }

      refreshDeveloperChanges();
      console.log(`${tank.name}: ${valueName} = ${tank[valueName]}`);
    }

    function clonePoint(point) {
      return { x: point.x, y: point.y };
    }

    function cloneBattleMapPreset(preset) {
      return {
        ...preset,
        rivers: preset.rivers.map((river) => ({
          width: river.width,
          points: river.points.map(clonePoint)
        })),
        rocks: preset.rocks.map(([x, y, radius]) => [x, y, radius]),
        base: { ...preset.base },
        warPoints: preset.warPoints.map(([x, y]) => [x, y]),
        warBases: {
          ally: [...preset.warBases.ally],
          enemy: [...preset.warBases.enemy]
        },
        details: preset.details ? {
          ...preset.details,
          roads: preset.details.roads.map((road) => road.map(clonePoint))
        } : null
      };
    }

    function pickBattleMapPreset() {
      const presets = selectedBattleMode.id === "war" ? warBattleMapPresets : battleMapPresets;

      return cloneBattleMapPreset(pickRandomTank(presets));
    }

    function getCurrentMapPreset() {
      return battleState.mapPreset || battleMapPresets[0];

        .forEach(([x, y, radius]) => rocks.push({ x, y, radius }));
      return rocks;

    function tankHasRotatingTurret(className) {
      return !["\u041f\u0422", "\u041f\u0422-\u0421\u0410\u0423", "\u0421\u0410\u0423"].includes(className);
    }

    function pickRandomTank(tanks) {
      return tanks[Math.floor(Math.random() * tanks.length)];
    }

    function createRandomNickname() {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      const length = 4 + Math.floor(Math.random() * 5);
      let nickname = "";

      for (let index = 0; index < length; index += 1) {
        nickname += alphabet[Math.floor(Math.random() * alphabet.length)];
      }

      return nickname;
    }

    function normalizeShellType(value) {
      return String(value)
        .trim()
        .toUpperCase()
        .replace(/\s+/g, "");
    }

    function getShellPenetration(tank, shellType) {
      const normalizedShellType = normalizeShellType(shellType);
      const knownShellTypes = ["\u0411\u0411", "\u041a\u0421", "\u041e\u0424", "\u041f\u0411"];

      if (!knownShellTypes.includes(normalizedShellType)) {
        return 1000;
      }

      const penetration = normalizeNumber(tank?.penetration?.[normalizedShellType] || 0);

      return penetration > 0 ? penetration : 1000;
    }

    function getTankShells(tank) {
      const shells = Array.isArray(tank.shells) ? tank.shells : [];

      return [0, 1, 2].map((index) => ({
        type: shells[index]?.type || "-",
        damage: normalizeNumber(shells[index]?.damage || 0),
        penetration: getShellPenetration(tank, shells[index]?.type || "-")
      }));
    }

    function getTankHealth(tank) {
      return normalizeNumber(tank.health || 0) || 100;
    }

    function getTankReloadTime(tank, isBot) {
      return normalizePositiveFloat(tank.reloadTime || 0) || (isBot ? 1.6 : 0.75);
    }

    function getTankMoveSpeed(tank, isBot) {
      const movementDelay = normalizePositiveFloat(tank.movementDelay || 0);
      const baseSpeed = movementDelay > 0 ? movementStepPixels / movementDelay : 210;
      const speed = Math.max(90, Math.min(280, baseSpeed));

      return isBot ? speed * 0.82 : speed;
    }

    function getTankTurnSpeed(tank, isBot) {
      const hullTurnDelay = normalizePositiveFloat(tank.hullTurnDelay || 0);
      const degreesPerSecond = hullTurnDelay > 0 ? 1 / hullTurnDelay : (isBot ? 126 : 183);

      return Math.max(0.75, Math.min(4.2, degreesPerSecond * Math.PI / 180));
    }

    function tankIsAlive(tank) {
      return Boolean(tank && tank.health > 0);
    }

    function getTankClassKey(tank) {
      return String(tank?.className || tank?.tank?.className || "")
        .trim()
        .toUpperCase();
    }

    function tankIsArtillery(tank) {
      return getTankClassKey(tank) === "\u0421\u0410\u0423" || normalizeNumber(tank?.gunType || tank?.tank?.gunType || 0) === 6;
    }

    function getTankCamouflage(tank) {
      const className = getTankClassKey(tank);
      const values = {
        "\u0421\u0410\u0423": 0.62,
        "\u041b\u0422": 0.68,
        "\u0421\u0422": 1,
        "\u041f\u0422": 1.24,
        "\u041f\u0422-\u0421\u0410\u0423": 1.24,
        "\u0422\u0422": 1.38
      };

      return values[className] || 1;
    }

    function getTankViewRange(tank) {
      const className = getTankClassKey(tank);
      const values = {
        "\u041b\u0422": 680,
        "\u0421\u0422": 620,
        "\u0422\u0422": 560,
        "\u041f\u0422": 585,
        "\u041f\u0422-\u0421\u0410\u0423": 585,
        "\u0421\u0410\u0423": 520
      };

      return values[className] || 590;
    }

    function canTankSeeTank(observer, target) {
      if (!tankIsAlive(observer) || !tankIsAlive(target) || observer.team === target.team) {
        return false;
      }

      const distance = Math.hypot(target.x - observer.x, target.y - observer.y);
      const visibleDistance = getTankViewRange(observer) * getTankCamouflage(target);

      return distance <= visibleDistance;
    }

    function updateSpotting() {
      battleState.allies.forEach((tank) => {
        tank.spotted = tankIsAlive(tank) && battleState.enemies.some((enemy) => canTankSeeTank(enemy, tank));
      });
      battleState.enemies.forEach((tank) => {
        tank.spotted = tankIsAlive(tank) && battleState.allies.some((ally) => canTankSeeTank(ally, tank));
      });

      if (battleState.player) {
        battleState.player.spotted = true;
      }
    }

    function getBestShell(tank) {
      return tank.shells.reduce((bestShell, shell) => (
        shell.damage > bestShell.damage ? shell : bestShell
      ), tank.shells[0] || { type: "-", damage: 0 });
    }

    function getTankDamagePotential(tank) {
      const shell = getBestShell(tank);
      const reloadTime = Math.max(0.1, tank.reloadTime || 1);

      return shell.damage / reloadTime + shell.damage * 0.25;
    }

    function createBattleStats() {
      return {
        damage: 0,
        kills: 0,
        shots: 0,
        hits: 0,
      baseCapture: 0,
      medals: [],
      lowHealthSoloCapture: false,
      experience: 0,
      silver: 0,
      rewardsApplied: false
      };
    }

    function renderBattleAmmoPanel() {

      battleAmmoPanel.replaceChildren();

      if (!player) {
        battleAmmoPanel.style.display = "none";
        return;
      }

      player.shells.forEach((shell, index) => {
        const slot = document.createElement("button");

        slot.type = "button";

        type.className = "battleAmmoType";
        damage.className = "battleAmmoDamage";
        clip.className = "battleAmmoKey";
        key.textContent = String(index + 1);
        type.textContent = shell.type;
        damage.textContent = player.shellsPerShot > 1 && !player.clipFireMode ? `${shell.damage} x${player.shellsPerShot}` : String(shell.damage);
        clip.textContent = [2, 3].includes(player.gunType)
          ? `${player.clipAmmo}/${player.clipSize}`
          : player.clipFireMode ? `${player.burstClipAmmo}/${player.shellsPerShot}` : "";
        slot.addEventListener("click", () => selectPlayerShell(index));
        slot.append(key, type, damage);
        if (clip.textContent) {
          slot.append(clip);

        battleAmmoPanel.append(slot);

      if (playerCanToggleClipFireMode(player)) {
        const modeSlot = document.createElement("button");

    function selectPlayerShell(index) {
      const player = battleState.player;

      if (!tankIsAlive(player) || !player.shells[index]) {
        return;

      battleState.selectedShellIndex = index;
      battleState.selectedShell = player.shells[index];
      renderBattleAmmoPanel();
    }

    function playerCanToggleClipFireMode(player) {
      return tankIsAlive(player) && player.gunType === 1 && player.shellsPerShot > 1;
    }

    function togglePlayerClipFireMode() {
      const player = battleState.player;

      if (!playerCanToggleClipFireMode(player)) {
        return;
      }

      player.clipFireMode = !player.clipFireMode;

      if (player.clipFireMode && player.burstClipAmmo <= 0 && player.reloadTimer <= 0) {
        player.burstClipAmmo = player.shellsPerShot;
      }

      renderBattleAmmoPanel();
    }

    function createBattleTank(tank, x, y, angle, isBot = false, team = "ally", nickname = "") {
      const className = (tank.className || "").toUpperCase();
      const hasTurret = tankHasRotatingTurret(className);
      const turretTurnSpeeds = {
        "\u041b\u0422": 5.6,
        "\u0421\u0422": 3.8,
        "\u0422\u0422": 2.2
      };
      const turretTurnSpeed = hasTurret ? turretTurnSpeeds[className] || (isBot ? 2.8 : 3.8) : 0;
      const maxHealth = getTankHealth(tank);
      const reloadTime = getTankReloadTime(tank, isBot);
      const gunType = normalizeNumber(tank.gunType || 1) || 1;
      const shellsPerShot = Math.max(1, normalizeNumber(tank.shellsPerShot || 1) || 1);
      const clipSize = [2, 3].includes(gunType) ? Math.max(1, normalizeNumber(tank.clipSize || 1) || 1) : 0;
      const gunSpreadDegrees = normalizePositiveFloat(tank.gunSpreadDegrees || 0);

      return {
        tank,
        x,
        y,
        angle,
        turretAngle: angle,
        radius: 34,
        collisionWidth: 78,
        collisionHeight: 48,
        speed: getTankMoveSpeed(tank, isBot),
        turnSpeed: getTankTurnSpeed(tank, isBot),
        className,
        hasTurret,
        turretTurnSpeed,
        maxHealth,
        health: maxHealth,
        isBot,
        team,
        nickname: nickname || createRandomNickname(),
        spotted: team === "ally",
        shells: getTankShells(tank),
        reloadTimer: 0,
        reloadTime,
        gunType,
        shellsPerShot,
        clipSize,
        gunSpreadRadians: gunSpreadDegrees * Math.PI / 180,
        clipAmmo: clipSize || 0,
        clipFireMode: false,
        burstClipAmmo: shellsPerShot,
        clipShotDelay: 0.38,
        clipReloadTimer: 0,
        bodyImage: getBattleImage(`./img/korpus/${tank.name}.png`),
        turretImage: hasTurret ? getBattleImage(`./img/bashnya/${tank.name}.png`) : null,
        botTurnTimer: 0,
        botThinkTimer: 0,
        botTarget: null,
        botOrbitDirection: Math.random() < 0.5 ? -1 : 1,
        botAvoidTimer: 0,
        botPreferredDistance: isBot ? 230 + Math.random() * 180 : 0,
        botPathPoint: null,
        botPathTimer: 0,
        botStuckTimer: 0,
        botLastX: x,
        botLastY: y
      };
    }

    function getAllBattleTanks() {
      return [...battleState.allies, ...battleState.enemies];
    }

    function getAliveBattleTanks() {
      return getAllBattleTanks().filter(tankIsAlive);
    }

    function normalizeAngle(angle) {
      return Math.atan2(Math.sin(angle), Math.cos(angle));
    }

    function rotateAngleToward(currentAngle, targetAngle, maxStep) {
      const difference = normalizeAngle(targetAngle - currentAngle);

      if (Math.abs(difference) <= maxStep) {
        return normalizeAngle(targetAngle);
      }

      return normalizeAngle(currentAngle + Math.sign(difference) * maxStep);
    }

    function circleIntersectsRect(circle, rect) {
      const nearestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
      const nearestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
      const dx = circle.x - nearestX;
      const dy = circle.y - nearestY;

      return dx * dx + dy * dy < circle.radius * circle.radius;
    }

    function createRotatedRect(x, y, width, height, angle = 0) {
      return { x, y, width, height, angle };
    }

    function getTankCollisionRect(tank, x = tank.x, y = tank.y) {
      return createRotatedRect(
        x,
        y,
        tank.collisionWidth || 78,
        tank.collisionHeight || 48,
        tank.angle || 0
      );
    }

    function getRotatedRectCorners(rect) {
      const halfWidth = rect.width / 2;
      const halfHeight = rect.height / 2;
      const cos = Math.cos(rect.angle || 0);
      const sin = Math.sin(rect.angle || 0);
      const points = [
        { x: -halfWidth, y: -halfHeight },
        { x: halfWidth, y: -halfHeight },
        { x: halfWidth, y: halfHeight },
        { x: -halfWidth, y: halfHeight }
      ];

      return points.map((point) => ({
        x: rect.x + point.x * cos - point.y * sin,
        y: rect.y + point.x * sin + point.y * cos
      }));
    }

    function getRotatedRectBounds(rect) {
      const corners = getRotatedRectCorners(rect);
      const xs = corners.map((point) => point.x);
      const ys = corners.map((point) => point.y);

      return {
        left: Math.min(...xs),
        right: Math.max(...xs),
        top: Math.min(...ys),
        bottom: Math.max(...ys)
      };
    }

    function rangesOverlap(first, second) {
      return first.max >= second.min && second.max >= first.min;
    }

    function projectPoints(points, axis) {
      const values = points.map((point) => point.x * axis.x + point.y * axis.y);

      return {
        min: Math.min(...values),
        max: Math.max(...values)
      };
    }

    function getRectAxes(rect) {
      const cos = Math.cos(rect.angle || 0);
      const sin = Math.sin(rect.angle || 0);

      return [
        { x: cos, y: sin },
        { x: -sin, y: cos }
      ];
    }

    function rotatedRectsIntersect(first, second) {
      const firstCorners = getRotatedRectCorners(first);
      const secondCorners = getRotatedRectCorners(second);
      const axes = [...getRectAxes(first), ...getRectAxes(second)];

      return axes.every((axis) => rangesOverlap(
        projectPoints(firstCorners, axis),
        projectPoints(secondCorners, axis)
      ));
    }

    function circleIntersectsRotatedRect(circle, rect) {
      const cos = Math.cos(-(rect.angle || 0));
      const sin = Math.sin(-(rect.angle || 0));
      const dx = circle.x - rect.x;
      const dy = circle.y - rect.y;
      const localX = dx * cos - dy * sin;
      const localY = dx * sin + dy * cos;
      const nearestX = Math.max(-rect.width / 2, Math.min(localX, rect.width / 2));
      const nearestY = Math.max(-rect.height / 2, Math.min(localY, rect.height / 2));
      const hitX = localX - nearestX;
      const hitY = localY - nearestY;

      return hitX * hitX + hitY * hitY < circle.radius * circle.radius;
    }

    function rotatedRectTouchesCircle(rect, circle) {
      return circleIntersectsRotatedRect(circle, rect);
    }

    function getBuildingCollisionRect(building) {
      const [x, y, width, height, angle = 0] = building;

      return createRotatedRect(x, y, width, height, angle);
    }

    function getRockCollisionRect(rock, index = 0) {
      return createRotatedRect(
        rock.x,
        rock.y + rock.radius * 0.1,
        rock.radius * 2.05,
        rock.radius * 1.08,
        (index * 0.73) % Math.PI
      );
    }

    function distancePointToSegmentSquared(point, start, end) {
      const segmentX = end.x - start.x;
      const segmentY = end.y - start.y;
      const lengthSquared = segmentX * segmentX + segmentY * segmentY;

      if (lengthSquared === 0) {
        const dx = point.x - start.x;
        const dy = point.y - start.y;
        return dx * dx + dy * dy;
      }

      const t = Math.max(0, Math.min(1, (
        (point.x - start.x) * segmentX + (point.y - start.y) * segmentY
      ) / lengthSquared));
      const nearestX = start.x + segmentX * t;
      const nearestY = start.y + segmentY * t;
      const dx = point.x - nearestX;
      const dy = point.y - nearestY;

      return dx * dx + dy * dy;
    }

    function circleTouchesRiver(circle) {
      return battleState.rivers.some((river) => {
        const riverRadius = river.width / 2 + circle.radius;

        for (let index = 0; index < river.points.length - 1; index += 1) {
          if (distancePointToSegmentSquared(circle, river.points[index], river.points[index + 1]) < riverRadius * riverRadius) {
            return true;
          }
        }

        return false;
      });
    }

    function tankIsInRiver(tank) {
      return battleState.rivers.some((river) => {
        const riverRadius = river.width / 2 + tank.radius * 0.25;

        for (let index = 0; index < river.points.length - 1; index += 1) {
          if (distancePointToSegmentSquared(tank, river.points[index], river.points[index + 1]) < riverRadius * riverRadius) {
            return true;
          }
        }

        return false;
      });
    }

    function getTerrainSpeedMultiplier(tank) {
      return 1;
    }

    function tankCollides(tank) {
      const collisionRect = getTankCollisionRect(tank);
      const bounds = getRotatedRectBounds(collisionRect);

      if (
        bounds.left < 0
        || bounds.top < 0
        || bounds.right > battleState.mapWidth
        || bounds.bottom > battleState.mapHeight
      ) {
        return true;
      }

      if (battleState.rocks.some((rock, index) => {
        return rotatedRectsIntersect(collisionRect, getRockCollisionRect(rock, index));
      })) {
        return true;
      }

      if ((battleState.mapDetails?.buildings || []).some((building) => (
        rotatedRectsIntersect(collisionRect, getBuildingCollisionRect(building))
      ))) {
        return true;
      }

      if (getAllBattleTanks().some((otherTank) => {
        if (otherTank === tank) {
          return false;
        }

        return rotatedRectsIntersect(collisionRect, getTankCollisionRect(otherTank));
      })) {
        return true;
      }

      return false;
    }

    function moveTank(tank, distance) {
      const previousX = tank.x;
      const previousY = tank.y;
      const terrainMultiplier = getTerrainSpeedMultiplier(tank);

      tank.x += Math.cos(tank.angle) * distance * terrainMultiplier;
      tank.y += Math.sin(tank.angle) * distance * terrainMultiplier;

      if (tankCollides(tank)) {
        tank.x = previousX;
        tank.y = previousY;
        return false;
      }

      return true;
    }

    function updateReloadTimers(delta) {
      getAliveBattleTanks().forEach((tank) => {
        const previousReloadTimer = tank.reloadTimer;

        tank.reloadTimer = Math.max(0, tank.reloadTimer - delta);

        if (tank.gunType === 2 && previousReloadTimer > 0 && tank.reloadTimer <= 0 && tank.clipAmmo <= 0) {
          tank.clipAmmo = tank.clipSize;
          if (tank === battleState.player) {
            renderBattleAmmoPanel();
          }
          return;
        }

        if (tank.gunType === 1 && tank.clipFireMode && previousReloadTimer > 0 && tank.reloadTimer <= 0 && tank.burstClipAmmo <= 0) {
          tank.burstClipAmmo = tank.shellsPerShot;
          if (tank === battleState.player) {
            renderBattleAmmoPanel();
          }
          return;
        }

        if (tank.gunType !== 3 || tank.clipAmmo >= tank.clipSize || tank.clipReloadTimer <= 0) {
          return;
        }

        tank.clipReloadTimer = Math.max(0, tank.clipReloadTimer - delta);

        if (tank.clipReloadTimer <= 0) {
          tank.clipAmmo = Math.min(tank.clipSize, tank.clipAmmo + 1);
          tank.clipReloadTimer = tank.clipAmmo < tank.clipSize ? tank.reloadTime : 0;
          if (tank === battleState.player) {
            renderBattleAmmoPanel();
          }
        }
      });
    }

    function updatePlayerTank(delta) {
      const player = battleState.player;

      if (!tankIsAlive(player)) {
        return;
      }

      if (pressedKeys.has("a") || pressedKeys.has("ф")) {
        player.angle -= player.turnSpeed * delta;
      }

      if (pressedKeys.has("d") || pressedKeys.has("в")) {
        player.angle += player.turnSpeed * delta;
      }

      if (pressedKeys.has("w") || pressedKeys.has("ц")) {
        moveTank(player, player.speed * delta);
      }
