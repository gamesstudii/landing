<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tanks Wars</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --top-bar-height: 15vh;
      --left-panel-width: min(clamp(108px, 10vw, 156px), calc((100vh - var(--top-bar-height)) / 7));
      --tank-bar-height: calc((100vw - var(--left-panel-width)) / 8 * 9 / 16);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    #hangarTank {
      position: absolute;
      left: 50%;
      top: 52%;
      width: min(46vw, 560px);
      height: min(32vh, 300px);
      transform: translateX(-50%);
      display: none;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
    }

    #statsPanel {
      position: absolute;
      top: var(--top-bar-height);
      right: 0;
      width: min(360px, 34vw);
      bottom: var(--tank-bar-height);
      padding: 72px 24px 28px;
      color: #ff1f1f;
      background: rgba(0, 0, 0, 0.62);
      display: none;
      align-items: flex-start;
      justify-content: flex-start;
      font-family: Tahoma, Arial, sans-serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    #sideButtons {
      position: absolute;
      top: var(--top-bar-height);
      left: 0;
      bottom: var(--tank-bar-height);
      width: var(--left-panel-width);
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      z-index: 3;
    }

    .sideButton {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 5px solid #000;
      background: #413f33;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sideButton:active {
      transform: scale(0.96);
    }

    .sideButtonIcon {
      width: 72%;
      height: 72%;
      object-fit: contain;
      pointer-events: none;
    }

    #screenOverlay {
      position: absolute;
      inset: 0;
      display: none;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    #screenOverlay.active {
      display: block;
    }

    #backButton {
      position: absolute;
      top: 20px;
      right: 20px;
      width: clamp(72px, 8vw, 128px);
      height: clamp(42px, 4vw, 64px);
      border: 4px solid #000;
      background: #413f33;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-size: clamp(16px, 1.5vw, 24px);
      font-weight: 700;
      cursor: pointer;
      z-index: 12;
    }

    #overlayContent {
      position: absolute;
      inset: var(--top-bar-height) 0 var(--tank-bar-height) var(--left-panel-width);
      padding: 24px;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      z-index: 11;
    }

    .overlayMessage {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(28px, 4vw, 64px);
      font-weight: 700;
      text-align: center;
    }

    .upgradeScreen {
      position: relative;
      height: 100%;
      display: grid;
      grid-template-columns: minmax(180px, 34%) 1fr;
      gap: clamp(28px, 6vw, 96px);
      align-items: center;
    }

    .upgradeSource,
    .upgradeTargets {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upgradeSource .tankSlot,
    .upgradeTarget .tankSlot {
      width: min(32vw, 360px);
      flex: 0 0 auto;
    }

    .upgradeTargets {
      height: 100%;
      flex-direction: column;
      align-items: stretch;
    }

    .upgradeTarget {
      flex: 1 1 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 100%;
    }

    .upgradePrice {
      min-width: 120px;
      color: #ff1f1f;
      font-size: clamp(16px, 1.4vw, 24px);
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
    }

    .upgradeLines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    #topBar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: var(--top-bar-height);
      padding: 0;
      background: #000;
      display: none;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0;
      z-index: 3;
    }

    .topSlot {
      aspect-ratio: 16 / 9;
      max-height: 100%;
      justify-self: center;
      align-self: center;
      width: 100%;
      border: 5px solid #ff1f1f;
      background: rgba(255, 255, 255, 0.04);
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-align: center;
      line-height: 1.05;
      overflow: hidden;
    }

    .topLabel {
      font-size: clamp(10px, 0.85vw, 14px);
    }

    .topValue {
      font-size: clamp(16px, 1.6vw, 28px);
    }

    .battleButton {
      cursor: pointer;
      font-size: clamp(18px, 2vw, 34px);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .battleButton:active {
      transform: scale(0.98);
    }

    #tankBar {
      position: absolute;
      left: var(--left-panel-width);
      right: 0;
      bottom: 0;
      height: var(--tank-bar-height);
      padding: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: smooth;
      gap: 0;
      z-index: 2;
    }

    #tankBar::-webkit-scrollbar {
      display: none;
    }

    #searchSlot {
      position: absolute;
      left: 0;
      bottom: 0;
      width: var(--left-panel-width);
      height: var(--left-panel-width);
      border: 5px solid #000;
      background: #413f33;
      display: none;
      z-index: 3;
    }

    .tankSlot {
      flex: 0 0 calc(100% / 8);
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tankCard {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 100%;
      border: 2px solid rgba(255, 255, 255, 0.32);
      background-color: rgba(20, 20, 20, 0.78);
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      overflow: hidden;
      cursor: pointer;
    }

    .tankCard.selected {
      border-color: #ff1f1f;
      box-shadow: inset 0 0 0 2px rgba(255, 31, 31, 0.52);
    }

    .tankCard::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.26);
    }

    .tankImage {
      position: absolute;
      z-index: 1;
      left: 50%;
      top: 50%;
      width: 82%;
      height: 64%;
      object-fit: contain;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .tankLevel,
    .tankName {
      position: absolute;
      z-index: 2;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
    }

    .tankLevel {
      top: 8px;
      left: 10px;
      font-size: clamp(16px, 1.5vw, 24px);
      line-height: 1;
    }

    .tankName {
      left: 8px;
      right: 8px;
      bottom: 8px;
      font-size: clamp(14px, 1.25vw, 20px);
      line-height: 1.1;
      text-align: center;
      overflow-wrap: anywhere;
    }

    @media (max-width: 700px) {
      #statsPanel {
        width: 42vw;
        padding: 52px 16px 20px;
        font-size: 22px;
      }

      #sideButtons {
        gap: 0;
      }

      #topBar {
        gap: 0;
        padding: 0;
      }

      #tankBar {
        gap: 0;
        padding: 0;
      }
    }

    .playing #hangarTank {
      display: block;
    }

    .playing #statsPanel {
      display: flex;
    }

    .playing #topBar {
      display: grid;
    }

    .playing #sideButtons {
      display: flex;
    }

    .playing #searchSlot {
      display: block;
    }

    .playing #tankBar {
      display: flex;
    }
  </style>
</head>
<body>
  <main id="game" aria-label="Tanks Wars">
    <section id="topBar" aria-label="Top panel"></section>
    <nav id="sideButtons" aria-label="Side buttons"></nav>
    <div id="searchSlot" aria-label="Tank search placeholder"></div>
    <aside id="statsPanel" aria-label="Tank stats"></aside>
    <section id="tankBar" aria-label="Tank selection"></section>
    <img id="hangarTank" alt="">
    <section id="screenOverlay" aria-label="Screen overlay">
      <button id="backButton" type="button">Назад</button>
      <div id="overlayContent"></div>
    </section>
  </main>

  <script>
    const game = document.querySelector("#game");
    const topBar = document.querySelector("#topBar");
    const sideButtons = document.querySelector("#sideButtons");
    const statsPanel = document.querySelector("#statsPanel");
    const tankBar = document.querySelector("#tankBar");
    const hangarTank = document.querySelector("#hangarTank");
    const screenOverlay = document.querySelector("#screenOverlay");
    const overlayContent = document.querySelector("#overlayContent");
    const backButton = document.querySelector("#backButton");
    const loadingFrames = [
      "./img/loading0.png",
      "./img/loading1.png",
      "./img/loading2.png",
      "./img/loading3.png"
    ];

    const frameDelay = 1000;
    const repeatCount = 3;
    const developerModeKey = "ujfgav8b6rvcb75av5tva7sr4av4456w*/va5*4w-bva4/-4gb-w89`7`9y7fhg9a";
    const playerResources = {
      blueprints: 0,
      silver: 0,
      gold: 0
    };
    const sideButtonIcons = [
      { file: "nation.png", label: "\u041d\u0430\u0446\u0438\u044f", screen: "nation" },
      { file: "upgrade.png", label: "\u0423\u043b\u0443\u0447\u0448\u0435\u043d\u0438\u044f", screen: "upgrade" },
      { file: "store.png", label: "\u041c\u0430\u0433\u0430\u0437\u0438\u043d", screen: "store" },
      { file: "pofile.png", label: "\u041f\u0440\u043e\u0444\u0438\u043b\u044c", screen: "profile" },
      { file: "settions.png", label: "\u041d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0438", screen: "settings" },
      { file: "events.png", label: "\u0421\u043e\u0431\u044b\u0442\u0438\u044f", screen: "events" }
    ];
    let selectedTank = null;
    let loadedTanks = [];
    let developerModeEnabled = false;
    let developerTankId = 1;
    const fallbackTanks = [
      { id: 1, name: "\u041c\u0421-1", level: "1", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 2 },
      { id: 2, name: "\u0411\u0422-2", level: "2", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 },
      { id: 3, name: "\u0410\u0422-1", level: "2", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 },
      { id: 4, name: "\u041b\u0422\u041f", level: "3", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 },
      { id: 5, name: "\u0411\u0422-7\u041c", level: "3", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 },
      { id: 6, name: "\u0421\u0423-76", level: "3", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 },
      { id: 7, name: "\u0422-28", level: "3", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 }
    ];
    let frameIndex = 0;
    let shownFrames = 0;
    const totalFrames = loadingFrames.length * repeatCount;

    function setBackground(imagePath) {
      game.style.backgroundImage = `url("${imagePath}")`;
    }

    function setCookie(name, value, maxAgeDays = 365) {
      try {
        localStorage.setItem(name, String(value));
      } catch (error) {
        console.warn("Local storage is unavailable.", error);
      }

      const maxAge = maxAgeDays * 24 * 60 * 60;
      document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; max-age=${maxAge}; path=/; SameSite=Lax`;
    }

    function getCookie(name) {
      try {
        const storedValue = localStorage.getItem(name);

        if (storedValue !== null) {
          return storedValue;
        }
      } catch (error) {
        console.warn("Local storage is unavailable.", error);
      }

      const encodedName = `${encodeURIComponent(name)}=`;
      const cookies = document.cookie ? document.cookie.split("; ") : [];
      const cookie = cookies.find((item) => item.startsWith(encodedName));

      if (!cookie) {
        return "";
      }

      const cookieValue = decodeURIComponent(cookie.slice(encodedName.length));
      try {
        localStorage.setItem(name, cookieValue);
      } catch (error) {
        console.warn("Local storage is unavailable.", error);
      }

      return cookieValue;
    }

    function normalizeNumber(value) {
      const number = Number.parseInt(value, 10);
      return Number.isFinite(number) && number > 0 ? number : 0;
    }

    function toEightDigits(value) {
      return String(normalizeNumber(value)).padStart(8, "0").slice(-8);
    }

    function formatStoredNumber(value) {
      return String(normalizeNumber(value));
    }

    function getTankExperienceCookieName(tank) {
      return `tank_${tank.id}_exp`;
    }

    function getTankStateCookieName(tank) {
      return `tank_${tank.id}_state`;
    }

    function normalizeTankState(value, fallback = 0) {
      const state = Number.parseInt(value, 10);

      if ([0, 1, 2].includes(state)) {
        return state;
      }

      return fallback;
    }

    function loadPlayerResources() {
      playerResources.blueprints = normalizeNumber(getCookie("blueprints") || 0);
      playerResources.silver = normalizeNumber(getCookie("silver") || 10000);
      playerResources.gold = normalizeNumber(getCookie("gold") || 100);
      setCookie("blueprints", playerResources.blueprints);
      setCookie("silver", playerResources.silver);
      setCookie("gold", playerResources.gold);
    }

    function applyStoredTankExperience(tanks) {
      return tanks.map((tank, index) => {
        const tankWithId = {
          ...tank,
          id: tank.id || index + 1
        };
        const experienceCookieName = getTankExperienceCookieName(tankWithId);
        const stateCookieName = getTankStateCookieName(tankWithId);
        const storedExperience = getCookie(experienceCookieName);
        const storedState = getCookie(stateCookieName);
        const experience = storedExperience
          ? toEightDigits(storedExperience)
          : toEightDigits(tankWithId.experience || 0);
        const state = tankWithId.name === "\u041c\u0421-1"
          ? 2
          : normalizeTankState(storedState, tankWithId.state);

        setCookie(experienceCookieName, experience);
        setCookie(stateCookieName, state);

        return {
          ...tankWithId,
          experience,
          state
        };
      });
    }

    function parseCsvLine(line) {
      const cells = [];
      let cell = "";
      let insideQuotes = false;

      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        const nextChar = line[index + 1];

        if (char === "\"" && nextChar === "\"") {
          cell += "\"";
          index += 1;
          continue;
        }

        if (char === "\"") {
          insideQuotes = !insideQuotes;
          continue;
        }

        if (char === "," && !insideQuotes) {
          cells.push(cell.trim());
          cell = "";
          continue;
        }

        cell += char;
      }

      cells.push(cell.trim());
      return cells;
    }

    function parseTankRows(csvText) {
      return csvText
        .trim()
        .split(/\r?\n/)
        .filter(Boolean)
        .map((line, index) => {
          const cells = parseCsvLine(line);

          return {
            id: index + 1,
            name: (cells[0] || "").replace(/^\uFEFF/, ""),
            level: cells[7] || "",
            nation: cells[8] || "",
            experience: "00000000",
            state: index === 0 ? 2 : 0,
            researchTargets: [cells[9], cells[10], cells[11]].filter(Boolean),
            researchExperiencePrice: normalizeNumber(cells[12] || 0),
            researchSilverPrice: normalizeNumber(cells[13] || 0)
          };
        })
        .filter((tank) => tank.name);
    }

    function countReplacementCharacters(value) {
      return (value.match(/\uFFFD/g) || []).length;
    }

    function decodeCsvBuffer(csvBuffer) {
      const utf8Text = new TextDecoder("utf-8").decode(csvBuffer);
      const windows1251Text = new TextDecoder("windows-1251").decode(csvBuffer);

      return countReplacementCharacters(utf8Text) <= countReplacementCharacters(windows1251Text)
        ? utf8Text
        : windows1251Text;
    }

    function toRoman(value) {
      const number = Number.parseInt(value, 10);
      const romanLevels = {
        1: "I",
        2: "II",
        3: "III",
        4: "IV",
        5: "V",
        6: "VI",
        7: "VII",
        8: "VIII",
        9: "IX",
        10: "X"
      };

      return romanLevels[number] || "";
    }

    function formatNationFileName(nation) {
      const normalizedNation = nation.trim().toLowerCase();
      const nationFiles = {
        "\u0441\u0441\u0441\u0440": "sssr",
        "\u0432\u0435\u043b\u0438\u043a\u043e\u0431\u0440\u0438\u0442\u0430\u043d\u0438\u044f": "uk",
        "\u0430\u043d\u0433\u043b\u0438\u044f": "uk",
        "\u043f\u043e\u043b\u044c\u0448\u0430": "poland",
        "\u0433\u0435\u0440\u043c\u0430\u043d\u0438\u044f": "germany",
        "\u0441\u0448\u0430": "usa",
        "\u0444\u0440\u0430\u043d\u0446\u0438\u044f": "france",
        "\u043a\u0438\u0442\u0430\u0439": "china",
        "\u044f\u043f\u043e\u043d\u0438\u044f": "japan",
        "\u0447\u0435\u0445\u043e\u0441\u043b\u043e\u0432\u0430\u043a\u0438\u044f": "czechoslovakia",
        "\u0447\u0435\u0445\u0438\u044f": "czech",
        "\u0448\u0432\u0435\u0446\u0438\u044f": "sweden",
        "\u0438\u0442\u0430\u043b\u0438\u044f": "italy"
      };

      if (nationFiles[normalizedNation]) {
        return nationFiles[normalizedNation];
      }

      return normalizedNation
        .replace(/\s+/g, "_")
        .replace(/[^a-z0-9_-]/g, "");
    }

    async function loadTankRows() {
      try {
        const response = await fetch("./data.csv", { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`CSV loading failed: ${response.status}`);
        }

        const csvBuffer = await response.arrayBuffer();
        const csvText = decodeCsvBuffer(csvBuffer);
        return applyStoredTankExperience(parseTankRows(csvText));
      } catch (error) {
        console.error(error);
        return applyStoredTankExperience(fallbackTanks);
      }
    }

    function selectTankCard(card, tank) {
      document
        .querySelectorAll(".tankCard.selected")
        .forEach((selectedCard) => selectedCard.classList.remove("selected"));

      card.classList.add("selected");
      selectTank(tank);
    }

    function selectTank(tank) {
      selectedTank = tank;
      statsPanel.textContent = tank.name;
      setTankImage(hangarTank, tank.name);
      renderTopBar();
    }

    function setTankImage(image, tankName) {
      delete image.dataset.fallbackLoaded;
      image.src = `./${tankName}.png`;
      image.onerror = () => {
        if (image.dataset.fallbackLoaded) {
          image.removeAttribute("src");
          return;
        }

        image.dataset.fallbackLoaded = "true";
        image.src = `./img/${tankName}.png`;
      };
    }

    function createTankCard(tank, selected = false, onSelect = null) {
      const card = document.createElement("article");
      const level = document.createElement("div");
      const tankImage = document.createElement("img");
      const name = document.createElement("div");
      const nationFileName = formatNationFileName(tank.nation);
      const activateCard = () => {
        if (onSelect) {
          onSelect(card, tank);
          return;
        }

        selectTankCard(card, tank);
      };

      card.className = "tankCard";
      card.tabIndex = 0;
      level.className = "tankLevel";
      tankImage.className = "tankImage";
      tankImage.alt = "";
      setTankImage(tankImage, tank.name);
      name.className = "tankName";
      level.textContent = toRoman(tank.level);
      name.textContent = tank.name;

      if (nationFileName) {
        card.style.backgroundImage = `url("./img/${nationFileName}.png"), url("./${nationFileName}.png")`;
      }

      card.append(level, tankImage, name);
      card.addEventListener("click", activateCard);
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          activateCard();
        }
      });

      if (selected) {
        card.classList.add("selected");
      }

      return card;
    }

    function renderTankBar(tanks) {
      tankBar.textContent = "";
      tankBar.scrollLeft = 0;

      tanks
        .filter((tank) => tank.state === 2)
        .forEach((tank, index) => {
          const slot = document.createElement("div");

          slot.className = "tankSlot";
          slot.append(createTankCard(tank, index === 0));
          tankBar.append(slot);
        });
    }

    function createTankSlot(tank, selected = false, onSelect = null) {
      const slot = document.createElement("div");

      slot.className = "tankSlot";
      slot.append(createTankCard(tank, selected, onSelect));
      return slot;
    }

    function findResearchTarget(value) {
      const targetId = normalizeNumber(value);

      if (targetId > 0) {
        return findTankById(targetId);
      }

      const targetName = normalizeTankName(value);
      return loadedTanks.find((tank) => normalizeTankName(tank.name) === targetName);
    }

    function normalizeTankName(value) {
      return String(value)
        .trim()
        .toLowerCase()
        .replace(/\u0451/g, "\u0435")
        .replace(/\s+/g, " ");
    }

    function findLoadedTankByReference(tank) {
      if (!tank) {
        return null;
      }

      return findTankById(tank.id)
        || loadedTanks.find((loadedTank) => normalizeTankName(loadedTank.name) === normalizeTankName(tank.name))
        || tank;
    }

    function getResearchPrice(sourceTank, targetTank) {
      if (targetTank.state === 2) {
        return "";
      }

      if (targetTank.state === 1) {
        if (sourceTank.researchSilverPrice) {
          return `${formatStoredNumber(sourceTank.researchSilverPrice)} серебра`;
        }

        return sourceTank.researchExperiencePrice
          ? `${formatStoredNumber(sourceTank.researchExperiencePrice)} опыта`
          : "";
      }

      if (sourceTank.researchExperiencePrice) {
        return `${formatStoredNumber(sourceTank.researchExperiencePrice)} опыта`;
      }

      return sourceTank.researchSilverPrice
        ? `${formatStoredNumber(sourceTank.researchSilverPrice)} серебра`
        : "";
    }

    function selectTankFromUpgrade(tank) {
      selectTank(tank);
      closeOverlay();
      renderTankBar(loadedTanks);
    }

    function drawUpgradeLines(screen) {
      const svg = screen.querySelector(".upgradeLines");
      const sourceCard = screen.querySelector(".upgradeSource .tankCard");
      const targetCards = [...screen.querySelectorAll(".upgradeTarget .tankCard")];

      svg.textContent = "";

      if (!sourceCard || targetCards.length === 0) {
        return;
      }

      const screenRect = screen.getBoundingClientRect();
      const sourceRect = sourceCard.getBoundingClientRect();
      const sourceX = sourceRect.right - screenRect.left;
      const sourceY = sourceRect.top + sourceRect.height / 2 - screenRect.top;

      targetCards.forEach((targetCard) => {
        const targetRect = targetCard.getBoundingClientRect();
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

        line.setAttribute("x1", sourceX);
        line.setAttribute("y1", sourceY);
        line.setAttribute("x2", targetRect.left - screenRect.left);
        line.setAttribute("y2", targetRect.top + targetRect.height / 2 - screenRect.top);
        line.setAttribute("stroke", "#000");
        line.setAttribute("stroke-width", "6");
        line.setAttribute("stroke-linecap", "round");
        svg.append(line);
      });
    }

    function renderUpgradeScreen() {
      const screen = document.createElement("div");
      const lines = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      const source = document.createElement("div");
      const targets = document.createElement("div");
      const sourceTank = findLoadedTankByReference(selectedTank);
      const targetTanks = (sourceTank?.researchTargets || [])
        .map(findResearchTarget)
        .filter(Boolean);

      screen.className = "upgradeScreen";
      lines.classList.add("upgradeLines");
      source.className = "upgradeSource";
      targets.className = "upgradeTargets";

      source.append(createTankSlot(sourceTank, true));

      if (targetTanks.length === 0) {
        const message = document.createElement("div");

        message.className = "overlayMessage";
        message.textContent = loadedTanks.length <= fallbackTanks.length
          ? "data.csv не загружен"
          : "Нет доступных улучшений";
        targets.append(message);
      } else {
        targetTanks.forEach((targetTank) => {
          const target = document.createElement("div");
          const price = document.createElement("div");

          target.className = "upgradeTarget";
          price.className = "upgradePrice";
          price.textContent = getResearchPrice(sourceTank, targetTank);
          target.append(
            createTankSlot(targetTank, targetTank.id === selectedTank.id, () => selectTankFromUpgrade(targetTank)),
            price
          );
          targets.append(target);
        });
      }

      screen.append(lines, source, targets);
      overlayContent.append(screen);
      requestAnimationFrame(() => drawUpgradeLines(screen));
    }

    function renderEventsScreen() {
      const message = document.createElement("div");

      message.className = "overlayMessage";
      message.textContent = "ивентов сегодня нету";
      overlayContent.append(message);
    }

    function openOverlay(screenName) {
      if (screenName === "nation") {
        return;
      }

      overlayContent.textContent = "";
      screenOverlay.classList.add("active");

      if (screenName === "events") {
        renderEventsScreen();
        return;
      }

      if (screenName === "upgrade") {
        renderUpgradeScreen();
      }
    }

    function closeOverlay() {
      screenOverlay.classList.remove("active");
      overlayContent.textContent = "";
    }

    tankBar.addEventListener("wheel", (event) => {
      if (tankBar.scrollWidth <= tankBar.clientWidth) {
        return;
      }

      event.preventDefault();
      tankBar.scrollLeft += event.deltaY || event.deltaX;
    }, { passive: false });

    function findTankById(id) {
      return loadedTanks.find((tank) => tank.id === normalizeNumber(id));
    }

    function getDeveloperTankData(id = developerTankId) {
      const tank = findTankById(id);

      if (!tank) {
        return null;
      }

      return {
        id: tank.id,
        name: tank.name,
        level: tank.level,
        nation: tank.nation,
        experience: tank.experience,
        state: tank.state
      };
    }

    function logDeveloperTank(id = developerTankId) {
      const tankData = getDeveloperTankData(id);

      if (!tankData) {
        console.warn(`Tank with id = ${normalizeNumber(id)} was not found.`);
        if (loadedTanks.length <= fallbackTanks.length) {
          console.warn("data.csv is not loaded. Open the game through hosting/server with data.csv next to index.html.");
        }
        return null;
      }

      console.table(tankData);
      return tankData;
    }

    function refreshSelectedTank() {
      if (!selectedTank || selectedTank.state !== 2) {
        selectedTank = loadedTanks.find((tank) => tank.state === 2) || fallbackTanks[0];
      }

      statsPanel.textContent = selectedTank.name;
      setTankImage(hangarTank, selectedTank.name);
    }

    function refreshDeveloperChanges() {
      refreshSelectedTank();
      renderTopBar();
      renderTankBar(loadedTanks);
    }

    function requireDeveloperMode(commandName) {
      if (developerModeEnabled) {
        return true;
      }

      console.warn(`Developer mode is disabled. Enter first: dev("${developerModeKey}")`);
      return false;
    }

    function setDeveloperResource(resourceName, value) {
      if (!requireDeveloperMode(resourceName)) {
        return;
      }

      playerResources[resourceName] = normalizeNumber(value);
      setCookie(resourceName, playerResources[resourceName]);
      renderTopBar();
      console.log(`${resourceName} = ${playerResources[resourceName]}`);
    }

    function setDeveloperTankValue(valueName, value) {
      if (!requireDeveloperMode(valueName)) {
        return;
      }

      const tank = findTankById(developerTankId);

      if (!tank) {
        console.warn(`Tank with id = ${developerTankId} was not found.`);
        if (loadedTanks.length <= fallbackTanks.length) {
          console.warn("data.csv is not loaded. Open the game through hosting/server with data.csv next to index.html.");
        }
        return;
      }

      if (valueName === "state") {
        tank.state = tank.name === "\u041c\u0421-1" ? 2 : normalizeTankState(value, tank.state);
        setCookie(getTankStateCookieName(tank), tank.state);
      }

      if (valueName === "experience") {
        tank.experience = toEightDigits(value);
        setCookie(getTankExperienceCookieName(tank), tank.experience);
      }

      if (selectedTank?.id === tank.id) {
        selectedTank = tank;
      }

      refreshDeveloperChanges();
      console.log(`${tank.name}: ${valueName} = ${tank[valueName]}`);
    }

    function enableDeveloperMode(code) {
      if (code !== developerModeKey) {
        console.warn("Invalid developer code.");
        return false;
      }

      developerModeEnabled = true;
      console.log("Developer mode enabled.");
      console.log(`Loaded tanks: ${loadedTanks.length}`);
      console.log("Commands: id = 2; tankInfo(); tankById(2); state = 2; experience = 1500; gold = 999; silver = 100000; blueprints = 25;");
      return true;
    }

    Object.defineProperties(window, {
      dev: {
        configurable: true,
        value: enableDeveloperMode
      },
      id: {
        configurable: true,
        get() {
          return developerTankId;
        },
        set(value) {
          if (!requireDeveloperMode("id")) {
            return;
          }

          developerTankId = normalizeNumber(value);
          logDeveloperTank(developerTankId);
        }
      },
      tank: {
        configurable: true,
        get() {
          if (!requireDeveloperMode("tank")) {
            return null;
          }

          return getDeveloperTankData();
        }
      },
      tankInfo: {
        configurable: true,
        value(idValue = developerTankId) {
          if (!requireDeveloperMode("tankInfo")) {
            return null;
          }

          return logDeveloperTank(idValue);
        }
      },
      tankById: {
        configurable: true,
        value(idValue) {
          if (!requireDeveloperMode("tankById")) {
            return null;
          }

          developerTankId = normalizeNumber(idValue);
          return logDeveloperTank(developerTankId);
        }
      },
      state: {
        configurable: true,
        get() {
          return findTankById(developerTankId)?.state;
        },
        set(value) {
          setDeveloperTankValue("state", value);
        }
      },
      experience: {
        configurable: true,
        get() {
          return findTankById(developerTankId)?.experience;
        },
        set(value) {
          setDeveloperTankValue("experience", value);
        }
      },
      gold: {
        configurable: true,
        get() {
          return playerResources.gold;
        },
        set(value) {
          setDeveloperResource("gold", value);
        }
      },
      silver: {
        configurable: true,
        get() {
          return playerResources.silver;
        },
        set(value) {
          setDeveloperResource("silver", value);
        }
      },
      blueprints: {
        configurable: true,
        get() {
          return playerResources.blueprints;
        },
        set(value) {
          setDeveloperResource("blueprints", value);
        }
      }
    });

    function createTopSlot(label, value, className = "") {
      const slot = document.createElement("div");
      const labelElement = document.createElement("div");
      const valueElement = document.createElement("div");

      slot.className = `topSlot ${className}`.trim();
      labelElement.className = "topLabel";
      valueElement.className = "topValue";
      labelElement.textContent = label;
      valueElement.textContent = value;
      slot.append(labelElement, valueElement);
      return slot;
    }

    function renderTopBar() {
      topBar.textContent = "";

      topBar.append(
        createTopSlot("Р§РµСЂС‚РµР¶Рё", playerResources.blueprints),
        createTopSlot("РћРїС‹С‚", selectedTank?.experience || 0),
        createTopSlot("", "Р’ Р±РѕР№", "battleButton"),
        createTopSlot("РЎРµСЂРµР±СЂРѕ", playerResources.silver),
        createTopSlot("Р—РѕР»РѕС‚Рѕ", playerResources.gold)
      );
    }

    function renderTopBar() {
      topBar.textContent = "";

      topBar.append(
        createTopSlot("\u0427\u0435\u0440\u0442\u0435\u0436\u0438", playerResources.blueprints),
        createTopSlot("\u041e\u043f\u044b\u0442", formatStoredNumber(selectedTank?.experience || 0)),
        createTopSlot("", "\u0412 \u0431\u043e\u0439", "battleButton"),
        createTopSlot("\u0421\u0435\u0440\u0435\u0431\u0440\u043e", formatStoredNumber(playerResources.silver)),
        createTopSlot("\u0417\u043e\u043b\u043e\u0442\u043e", formatStoredNumber(playerResources.gold))
      );
    }

    function renderSideButtons() {
      sideButtons.textContent = "";

      sideButtonIcons.forEach((icon) => {
        const button = document.createElement("button");
        const image = document.createElement("img");

        button.className = "sideButton";
        button.type = "button";
        button.setAttribute("aria-label", icon.label);

        image.className = "sideButtonIcon";
        image.src = `./img/${icon.file}`;
        image.alt = "";
        image.onerror = () => image.remove();

        button.addEventListener("click", () => openOverlay(icon.screen));
        button.append(image);
        sideButtons.append(button);
      });
    }

    backButton.addEventListener("click", closeOverlay);

    async function startGame() {
      setBackground("./img/angar.png");
      game.classList.add("playing");
      loadPlayerResources();

      loadedTanks = await loadTankRows();
      const availableTanks = loadedTanks.filter((tank) => tank.state === 2);
      selectedTank = availableTanks[0] || fallbackTanks[0];
      statsPanel.textContent = selectedTank.name;
      setTankImage(hangarTank, selectedTank.name);
      renderTopBar();
      renderSideButtons();
      renderTankBar(loadedTanks);
    }

    function showNextLoadingFrame() {
      setBackground(loadingFrames[frameIndex]);
      shownFrames += 1;
      frameIndex = (frameIndex + 1) % loadingFrames.length;

      if (shownFrames >= totalFrames) {
        setTimeout(startGame, frameDelay);
        return;
      }

      setTimeout(showNextLoadingFrame, frameDelay);
    }

    showNextLoadingFrame();
  </script>
</body>
</html>
