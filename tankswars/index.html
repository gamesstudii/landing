<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tanks Wars</title>
  <link rel="icon" type="image/png" href="./img/logo.png?v=1.1.0.2v13">
  <link rel="apple-touch-icon" href="./img/logo.png?v=1.1.0.2v13">
  <link rel="stylesheet" href="./css/styles.css?v=1.1.0.2v13">
</head>
<body>
  <main id="game" aria-label="Tanks Wars">
    <section id="topBar" aria-label="Top panel"></section>
    <nav id="sideButtons" aria-label="Side buttons"></nav>
    <div id="searchSlot" aria-label="Tank search placeholder"></div>
    <aside id="statsPanel" aria-label="Tank stats"></aside>
    <section id="tankBar" aria-label="Tank selection"></section>
    <img id="hangarTank" alt="">
    <section id="screenOverlay" aria-label="Screen overlay">
      <button id="backButton" type="button">Назад</button>
      <div id="overlayContent"></div>
    </section>
    <section id="battleView" aria-label="Battle">
      <canvas id="battleCanvas"></canvas>
      <div id="battleAmmoPanel" aria-label="Shell selection"></div>
      <div id="reloadIndicator" aria-hidden="true"></div>
      <div id="battleResult" aria-live="polite"></div>
      <button id="battleBackButton" type="button">Назад</button>
    </section>
  </main>

  <script src="./js/00-state.js?v=1.1.0.2v13"></script>
  <script src="./js/01-data.js?v=1.1.0.2v13"></script>
  <script src="./js/02-hangar-tech-tree.js?v=1.1.0.2v13"></script>
  <script src="./js/03-events-store-profile.js?v=1.1.0.2v13"></script>
  <script src="./js/04-ui-developer.js?v=1.1.0.2v13"></script>
  <script src="./js/05-battle-maps.js?v=1.1.0.2v13"></script>
  <script src="./js/06-battle-logic.js?v=1.1.0.2v13"></script>
  <script src="./js/07-battle-render.js?v=1.1.0.2v13"></script>
  <script src="./js/08-startup.js?v=1.1.0.2v13"></script>
</body>
</html>
