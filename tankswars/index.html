<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tanks Wars</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --top-bar-height: 15vh;
      --left-panel-width: min(clamp(108px, 10vw, 156px), calc((100vh - var(--top-bar-height)) / 7));
      --tank-bar-height: calc((100vw - var(--left-panel-width)) / 8 * 9 / 16);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    #hangarTank {
      position: absolute;
      left: 50%;
      top: 52%;
      width: min(46vw, 560px);
      height: min(32vh, 300px);
      transform: translateX(-50%);
      display: none;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
    }

    #statsPanel {
      position: absolute;
      top: var(--top-bar-height);
      right: 0;
      width: min(360px, 34vw);
      bottom: var(--tank-bar-height);
      padding: 72px 24px 28px;
      color: #ff1f1f;
      background: rgba(0, 0, 0, 0.62);
      display: none;
      align-items: flex-start;
      justify-content: flex-start;
      font-family: Tahoma, Arial, sans-serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    #sideButtons {
      position: absolute;
      top: var(--top-bar-height);
      left: 0;
      bottom: var(--tank-bar-height);
      width: var(--left-panel-width);
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      z-index: 3;
    }

    .sideButton {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 5px solid #000;
      background: #413f33;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sideButton:active {
      transform: scale(0.96);
    }

    .sideButtonIcon {
      width: 72%;
      height: 72%;
      object-fit: contain;
      pointer-events: none;
    }

    #screenOverlay {
      position: absolute;
      inset: 0;
      display: none;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    #screenOverlay.active {
      display: block;
    }

    #backButton {
      position: absolute;
      top: 20px;
      right: 20px;
      width: clamp(72px, 8vw, 128px);
      height: clamp(42px, 4vw, 64px);
      border: 4px solid #000;
      background: #413f33;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-size: clamp(16px, 1.5vw, 24px);
      font-weight: 700;
      cursor: pointer;
      z-index: 12;
    }

    #overlayContent {
      position: absolute;
      inset: var(--top-bar-height) 0 var(--tank-bar-height) var(--left-panel-width);
      padding: 24px;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      z-index: 11;
    }

    .overlayMessage {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(28px, 4vw, 64px);
      font-weight: 700;
      text-align: center;
    }

    .upgradeScreen {
      position: relative;
      height: 100%;
      display: grid;
      grid-template-columns: minmax(180px, 34%) 1fr;
      gap: clamp(28px, 6vw, 96px);
      align-items: center;
    }

    .upgradeSource,
    .upgradeTargets {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upgradeSource .tankSlot,
    .upgradeTarget .tankSlot {
      width: min(32vw, 360px);
      flex: 0 0 auto;
    }

    .upgradeTargets {
      height: 100%;
      flex-direction: column;
      align-items: stretch;
    }

    .upgradeTarget {
      flex: 1 1 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 100%;
    }

    .upgradePrice {
      min-width: 120px;
      color: #ff1f1f;
      font-size: clamp(16px, 1.4vw, 24px);
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
    }

    .upgradeLines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    #battleView {
      position: absolute;
      inset: 0;
      display: none;
      background: #31412b;
      z-index: 20;
    }

    #battleCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #battleBackButton {
      position: absolute;
      top: 20px;
      right: 20px;
      width: clamp(72px, 8vw, 128px);
      height: clamp(42px, 4vw, 64px);
      border: 4px solid #000;
      background: #413f33;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-size: clamp(16px, 1.5vw, 24px);
      font-weight: 700;
      cursor: pointer;
      z-index: 21;
    }

    #topBar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: var(--top-bar-height);
      padding: 0;
      background: #000;
      display: none;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0;
      z-index: 3;
    }

    .topSlot {
      aspect-ratio: 16 / 9;
      max-height: 100%;
      justify-self: center;
      align-self: center;
      width: 100%;
      border: 5px solid #ff1f1f;
      background: rgba(255, 255, 255, 0.04);
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-align: center;
      line-height: 1.05;
      overflow: hidden;
    }

    .topLabel {
      font-size: clamp(10px, 0.85vw, 14px);
    }

    .topValue {
      font-size: clamp(16px, 1.6vw, 28px);
    }

    .battleButton {
      cursor: pointer;
      font-size: clamp(18px, 2vw, 34px);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .battleButton:active {
      transform: scale(0.98);
    }

    #tankBar {
      position: absolute;
      left: var(--left-panel-width);
      right: 0;
      bottom: 0;
      height: var(--tank-bar-height);
      padding: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: smooth;
      gap: 0;
      z-index: 2;
    }

    #tankBar::-webkit-scrollbar {
      display: none;
    }

    #searchSlot {
      position: absolute;
      left: 0;
      bottom: 0;
      width: var(--left-panel-width);
      height: var(--left-panel-width);
      border: 5px solid #000;
      background: #413f33;
      display: none;
      z-index: 3;
    }

    .tankSlot {
      flex: 0 0 calc(100% / 8);
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tankCard {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 100%;
      border: 2px solid rgba(255, 255, 255, 0.32);
      background-color: rgba(20, 20, 20, 0.78);
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      overflow: hidden;
      cursor: pointer;
    }

    .tankCard.selected {
      border-color: #ff1f1f;
      box-shadow: inset 0 0 0 2px rgba(255, 31, 31, 0.52);
    }

    .tankCard::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.26);
    }

    .tankImage {
      position: absolute;
      z-index: 1;
      left: 50%;
      top: 50%;
      width: 82%;
      height: 64%;
      object-fit: contain;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .tankLevel,
    .tankName {
      position: absolute;
      z-index: 2;
      color: #ff1f1f;
      font-family: Tahoma, Arial, sans-serif;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
    }

    .tankLevel {
      top: 8px;
      left: 10px;
      font-size: clamp(16px, 1.5vw, 24px);
      line-height: 1;
    }

    .tankName {
      left: 8px;
      right: 8px;
      bottom: 8px;
      font-size: clamp(14px, 1.25vw, 20px);
      line-height: 1.1;
      text-align: center;
      overflow-wrap: anywhere;
    }

    @media (max-width: 700px) {
      #statsPanel {
        width: 42vw;
        padding: 52px 16px 20px;
        font-size: 22px;
      }

      #sideButtons {
        gap: 0;
      }

      #topBar {
        gap: 0;
        padding: 0;
      }

      #tankBar {
        gap: 0;
        padding: 0;
      }
    }

    .playing #hangarTank {
      display: block;
    }

    .playing #statsPanel {
      display: flex;
    }

    .playing #topBar {
      display: grid;
    }

    .playing #sideButtons {
      display: flex;
    }

    .playing #searchSlot {
      display: block;
    }

    .playing #tankBar {
      display: flex;
    }
  </style>
</head>
<body>
  <main id="game" aria-label="Tanks Wars">
    <section id="topBar" aria-label="Top panel"></section>
    <nav id="sideButtons" aria-label="Side buttons"></nav>
    <div id="searchSlot" aria-label="Tank search placeholder"></div>
    <aside id="statsPanel" aria-label="Tank stats"></aside>
    <section id="tankBar" aria-label="Tank selection"></section>
    <img id="hangarTank" alt="">
    <section id="screenOverlay" aria-label="Screen overlay">
      <button id="backButton" type="button">Назад</button>
      <div id="overlayContent"></div>
    </section>
    <section id="battleView" aria-label="Battle">
      <canvas id="battleCanvas"></canvas>
      <button id="battleBackButton" type="button">Назад</button>
    </section>
  </main>

  <script>
    const game = document.querySelector("#game");
    const topBar = document.querySelector("#topBar");
    const sideButtons = document.querySelector("#sideButtons");
    const statsPanel = document.querySelector("#statsPanel");
    const tankBar = document.querySelector("#tankBar");
    const hangarTank = document.querySelector("#hangarTank");
    const screenOverlay = document.querySelector("#screenOverlay");
    const overlayContent = document.querySelector("#overlayContent");
    const backButton = document.querySelector("#backButton");
    const battleView = document.querySelector("#battleView");
    const battleCanvas = document.querySelector("#battleCanvas");
    const battleBackButton = document.querySelector("#battleBackButton");
    const battleContext = battleCanvas.getContext("2d");
    const loadingFrames = [
      "./img/loading0.png",
      "./img/loading1.png",
      "./img/loading2.png",
      "./img/loading3.png"
    ];

    const frameDelay = 1000;
    const repeatCount = 3;
    const developerModeKey = "ujfgav8b6rvcb75av5tva7sr4av4456w*/va5*4w-bva4/-4gb-w89`7`9y7fhg9a";
    const playerResources = {
      blueprints: 0,
      silver: 0,
      gold: 0
    };
    const sideButtonIcons = [
      { file: "nation.png", label: "\u041d\u0430\u0446\u0438\u044f", screen: "nation" },
      { file: "upgrade.png", label: "\u0423\u043b\u0443\u0447\u0448\u0435\u043d\u0438\u044f", screen: "upgrade" },
      { file: "store.png", label: "\u041c\u0430\u0433\u0430\u0437\u0438\u043d", screen: "store" },
      { file: "pofile.png", label: "\u041f\u0440\u043e\u0444\u0438\u043b\u044c", screen: "profile" },
      { file: "settions.png", label: "\u041d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0438", screen: "settings" },
      { file: "events.png", label: "\u0421\u043e\u0431\u044b\u0442\u0438\u044f", screen: "events" }
    ];
    let selectedTank = null;
    let loadedTanks = [];
    let developerModeEnabled = false;
    let developerTankId = 1;
    const pressedKeys = new Set();
    const battleImages = new Map();
    const battleState = {
      active: false,
      lastTime: 0,
      animationFrame: 0,
      mapWidth: 2400,
      mapHeight: 1600,
      player: null,
      allies: [],
      enemies: [],
      camera: { x: 0, y: 0 },
      mouse: { x: 0, y: 0 },
      rocks: [],
      rivers: [
        { x: 0, y: 0, width: 560, height: 260 },
        { x: 1840, y: 1340, width: 560, height: 260 }
      ]
    };
    const fallbackTanks = [
      { id: 1, name: "\u041c\u0421-1", level: "1", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 2 },
      { id: 2, name: "\u0411\u0422-2", level: "2", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 },
      { id: 3, name: "\u0410\u0422-1", level: "2", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 },
      { id: 4, name: "\u041b\u0422\u041f", level: "3", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 },
      { id: 5, name: "\u0411\u0422-7\u041c", level: "3", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 },
      { id: 6, name: "\u0421\u0423-76", level: "3", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 },
      { id: 7, name: "\u0422-28", level: "3", nation: "\u0421\u0421\u0421\u0420", experience: "00000000", state: 0 }
    ];
    let frameIndex = 0;
    let shownFrames = 0;
    const totalFrames = loadingFrames.length * repeatCount;

    function setBackground(imagePath) {
      game.style.backgroundImage = `url("${imagePath}")`;
    }

    function setCookie(name, value, maxAgeDays = 365) {
      try {
        localStorage.setItem(name, String(value));
      } catch (error) {
        console.warn("Local storage is unavailable.", error);
      }

      const maxAge = maxAgeDays * 24 * 60 * 60;
      document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; max-age=${maxAge}; path=/; SameSite=Lax`;
    }

    function getCookie(name) {
      try {
        const storedValue = localStorage.getItem(name);

        if (storedValue !== null) {
          return storedValue;
        }
      } catch (error) {
        console.warn("Local storage is unavailable.", error);
      }

      const encodedName = `${encodeURIComponent(name)}=`;
      const cookies = document.cookie ? document.cookie.split("; ") : [];
      const cookie = cookies.find((item) => item.startsWith(encodedName));

      if (!cookie) {
        return "";
      }

      const cookieValue = decodeURIComponent(cookie.slice(encodedName.length));
      try {
        localStorage.setItem(name, cookieValue);
      } catch (error) {
        console.warn("Local storage is unavailable.", error);
      }

      return cookieValue;
    }

    function normalizeNumber(value) {
      const number = Number.parseInt(value, 10);
      return Number.isFinite(number) && number > 0 ? number : 0;
    }

    function toEightDigits(value) {
      return String(normalizeNumber(value)).padStart(8, "0").slice(-8);
    }

    function formatStoredNumber(value) {
      return String(normalizeNumber(value));
    }

    function getTankExperienceCookieName(tank) {
      return `tank_${tank.id}_exp`;
    }

    function getTankStateCookieName(tank) {
      return `tank_${tank.id}_state`;
    }

    function normalizeTankState(value, fallback = 0) {
      const state = Number.parseInt(value, 10);

      if ([0, 1, 2].includes(state)) {
        return state;
      }

      return fallback;
    }

    function loadPlayerResources() {
      playerResources.blueprints = normalizeNumber(getCookie("blueprints") || 0);
      playerResources.silver = normalizeNumber(getCookie("silver") || 10000);
      playerResources.gold = normalizeNumber(getCookie("gold") || 100);
      setCookie("blueprints", playerResources.blueprints);
      setCookie("silver", playerResources.silver);
      setCookie("gold", playerResources.gold);
    }

    function applyStoredTankExperience(tanks) {
      return tanks.map((tank, index) => {
        const tankWithId = {
          ...tank,
          id: tank.id || index + 1
        };
        const experienceCookieName = getTankExperienceCookieName(tankWithId);
        const stateCookieName = getTankStateCookieName(tankWithId);
        const storedExperience = getCookie(experienceCookieName);
        const storedState = getCookie(stateCookieName);
        const experience = storedExperience
          ? toEightDigits(storedExperience)
          : toEightDigits(tankWithId.experience || 0);
        const state = tankWithId.name === "\u041c\u0421-1"
          ? 2
          : normalizeTankState(storedState, tankWithId.state);

        setCookie(experienceCookieName, experience);
        setCookie(stateCookieName, state);

        return {
          ...tankWithId,
          experience,
          state
        };
      });
    }

    function parseCsvLine(line) {
      const cells = [];
      let cell = "";
      let insideQuotes = false;

      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        const nextChar = line[index + 1];

        if (char === "\"" && nextChar === "\"") {
          cell += "\"";
          index += 1;
          continue;
        }

        if (char === "\"") {
          insideQuotes = !insideQuotes;
          continue;
        }

        if (char === "," && !insideQuotes) {
          cells.push(cell.trim());
          cell = "";
          continue;
        }

        cell += char;
      }

      cells.push(cell.trim());
      return cells;
    }

    function parseTankRows(csvText) {
      return csvText
        .trim()
        .split(/\r?\n/)
        .filter(Boolean)
        .map((line, index) => {
          const cells = parseCsvLine(line);

          return {
            id: index + 1,
            name: (cells[0] || "").replace(/^\uFEFF/, ""),
            level: cells[7] || "",
            nation: cells[8] || "",
            experience: "00000000",
            state: index === 0 ? 2 : 0,
            researchTargets: [cells[9], cells[10], cells[11]].filter(Boolean),
            researchExperiencePrice: normalizeNumber(cells[12] || 0),
            researchSilverPrice: normalizeNumber(cells[13] || 0),
            className: (cells[14] || "").trim().toUpperCase()
          };
        })
        .filter((tank) => tank.name);
    }

    function countReplacementCharacters(value) {
      return (value.match(/\uFFFD/g) || []).length;
    }

    function decodeCsvBuffer(csvBuffer) {
      const utf8Text = new TextDecoder("utf-8").decode(csvBuffer);
      const windows1251Text = new TextDecoder("windows-1251").decode(csvBuffer);

      return countReplacementCharacters(utf8Text) <= countReplacementCharacters(windows1251Text)
        ? utf8Text
        : windows1251Text;
    }

    function toRoman(value) {
      const number = Number.parseInt(value, 10);
      const romanLevels = {
        1: "I",
        2: "II",
        3: "III",
        4: "IV",
        5: "V",
        6: "VI",
        7: "VII",
        8: "VIII",
        9: "IX",
        10: "X"
      };

      return romanLevels[number] || "";
    }

    function formatNationFileName(nation) {
      const normalizedNation = nation.trim().toLowerCase();
      const nationFiles = {
        "\u0441\u0441\u0441\u0440": "sssr",
        "\u0432\u0435\u043b\u0438\u043a\u043e\u0431\u0440\u0438\u0442\u0430\u043d\u0438\u044f": "uk",
        "\u0430\u043d\u0433\u043b\u0438\u044f": "uk",
        "\u043f\u043e\u043b\u044c\u0448\u0430": "poland",
        "\u0433\u0435\u0440\u043c\u0430\u043d\u0438\u044f": "germany",
        "\u0441\u0448\u0430": "usa",
        "\u0444\u0440\u0430\u043d\u0446\u0438\u044f": "france",
        "\u043a\u0438\u0442\u0430\u0439": "china",
        "\u044f\u043f\u043e\u043d\u0438\u044f": "japan",
        "\u0447\u0435\u0445\u043e\u0441\u043b\u043e\u0432\u0430\u043a\u0438\u044f": "czechoslovakia",
        "\u0447\u0435\u0445\u0438\u044f": "czech",
        "\u0448\u0432\u0435\u0446\u0438\u044f": "sweden",
        "\u0438\u0442\u0430\u043b\u0438\u044f": "italy"
      };

      if (nationFiles[normalizedNation]) {
        return nationFiles[normalizedNation];
      }

      return normalizedNation
        .replace(/\s+/g, "_")
        .replace(/[^a-z0-9_-]/g, "");
    }

    async function loadTankRows() {
      try {
        const response = await fetch("./data.csv", { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`CSV loading failed: ${response.status}`);
        }

        const csvBuffer = await response.arrayBuffer();
        const csvText = decodeCsvBuffer(csvBuffer);
        return applyStoredTankExperience(parseTankRows(csvText));
      } catch (error) {
        console.error(error);
        return applyStoredTankExperience(fallbackTanks);
      }
    }

    function selectTankCard(card, tank) {
      document
        .querySelectorAll(".tankCard.selected")
        .forEach((selectedCard) => selectedCard.classList.remove("selected"));

      card.classList.add("selected");
      selectTank(tank);
    }

    function selectTank(tank) {
      selectedTank = tank;
      statsPanel.textContent = tank.name;
      setTankImage(hangarTank, tank.name);
      renderTopBar();
    }

    function setTankImage(image, tankName) {
      delete image.dataset.fallbackLoaded;
      image.src = `./${tankName}.png`;
      image.onerror = () => {
        if (image.dataset.fallbackLoaded) {
          image.removeAttribute("src");
          return;
        }

        image.dataset.fallbackLoaded = "true";
        image.src = `./img/${tankName}.png`;
      };
    }

    function createTankCard(tank, selected = false, onSelect = null) {
      const card = document.createElement("article");
      const level = document.createElement("div");
      const tankImage = document.createElement("img");
      const name = document.createElement("div");
      const nationFileName = formatNationFileName(tank.nation);
      const activateCard = () => {
        if (onSelect) {
          onSelect(card, tank);
          return;
        }

        selectTankCard(card, tank);
      };

      card.className = "tankCard";
      card.tabIndex = 0;

        const price = targetTank.researchExperiencePrice;

          console.warn("Not enough experience.");

        sourceTank.experience = toEightDigits(sourceExperience - price);
        targetTank.state = 1;

        playerResources.silver -= price;

        savePlayerResources();
        saveTankState(targetTank);
        selectTank(targetTank);

      svg.textContent = "";

      if (!sourceCard || targetCards.length === 0) {
        return;

      const screenRect = screen.getBoundingClientRect();
      const sourceRect = sourceCard.getBoundingClientRect();
      const sourceX = sourceRect.right - screenRect.left;
      const sourceY = sourceRect.top + sourceRect.height / 2 - screenRect.top;

      targetCards.forEach((targetCard) => {
        const targetRect = targetCard.getBoundingClientRect();
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

        line.setAttribute("x1", sourceX);
        line.setAttribute("y1", sourceY);
        line.setAttribute("x2", targetRect.left - screenRect.left);
        line.setAttribute("y2", targetRect.top + targetRect.height / 2 - screenRect.top);
        line.setAttribute("stroke", "#000");
        line.setAttribute("stroke-width", "6");
        line.setAttribute("stroke-linecap", "round");
        svg.append(line);

    function createBattleRocks() {
      const rocks = [];
      const fixedRocks = [
        [420, 360, 58], [760, 260, 44], [1080, 420, 66], [1460, 300, 52],
        [1820, 520, 64], [360, 780, 62], [680, 1040, 48], [1120, 850, 72],

    function createBattleTank(tank, x, y, angle, isBot = false, team = "ally") {
      const className = (tank.className || "").toUpperCase();
      const turretTurnSpeeds = {
        "\u041b\u0422": 5.6,
        "\u0421\u0422": 3.8,
        "\u0422\u0422": 2.2
      };

      return {
        tank,
        x,
        y,
        angle,
        turretAngle: angle,
        radius: 34,
        speed: isBot ? 150 : 210,
        turnSpeed: isBot ? 2.2 : 3.2,
        className,
        turretTurnSpeed: turretTurnSpeeds[className] || 0,
        isBot,
        team,
        bodyImage: getBattleImage(`./img/body/${tank.name}.png`),

        botTurnTimer: 0
      };

    function getAllBattleTanks() {
      return [...battleState.allies, ...battleState.enemies];
    }

    function normalizeAngle(angle) {
      let normalized = angle;

      while (normalized > Math.PI) {
        normalized -= Math.PI * 2;
      }

      while (normalized < -Math.PI) {
        normalized += Math.PI * 2;
      }

      return normalized;
    }

    function rotateAngleToward(currentAngle, targetAngle, maxStep) {
      const difference = normalizeAngle(targetAngle - currentAngle);

      if (Math.abs(difference) <= maxStep) {
        return targetAngle;
      }

      return currentAngle + Math.sign(difference) * maxStep;
    }

    function circleIntersectsRect(circle, rect) {
      const nearestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
      const nearestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
      const dx = circle.x - nearestX;
      const dy = circle.y - nearestY;

      return dx * dx + dy * dy < circle.radius * circle.radius;
    }

    function tankCollides(tank) {
      if (
        tank.x - tank.radius < 0
        || tank.y - tank.radius < 0
        || tank.x + tank.radius > battleState.mapWidth
        || tank.y + tank.radius > battleState.mapHeight
      ) {
        return true;
      }

      if (battleState.rocks.some((rock) => {
        const dx = tank.x - rock.x;
        const dy = tank.y - rock.y;
        const minDistance = tank.radius + rock.radius;

        return dx * dx + dy * dy < minDistance * minDistance;
      })) {
        return true;
      }

      if (getAllBattleTanks().some((otherTank) => {
        if (otherTank === tank) {
          return false;
        }

        const dx = tank.x - otherTank.x;
        const dy = tank.y - otherTank.y;
        const minDistance = tank.radius + otherTank.radius;

        return dx * dx + dy * dy < minDistance * minDistance;
      })) {
        return true;
      }

      return battleState.rivers.some((river) => circleIntersectsRect(tank, river));
    }

    function moveTank(tank, distance) {
      const previousX = tank.x;
      const previousY = tank.y;

      tank.x += Math.cos(tank.angle) * distance;
      tank.y += Math.sin(tank.angle) * distance;

      if (tankCollides(tank)) {
        tank.x = previousX;
        tank.y = previousY;
        return false;
      }

      return true;
    }

    function updatePlayerTank(delta) {
      const player = battleState.player;

      if (pressedKeys.has("a") || pressedKeys.has("ф")) {
        player.angle -= player.turnSpeed * delta;
      }

      if (pressedKeys.has("d") || pressedKeys.has("в")) {
        player.angle += player.turnSpeed * delta;
      }

      if (pressedKeys.has("w") || pressedKeys.has("ц")) {
        moveTank(player, player.speed * delta);
      }

      if (pressedKeys.has("s") || pressedKeys.has("ы")) {
        moveTank(player, -player.speed * 0.65 * delta);
      }

      if (player.turretTurnSpeed > 0) {
        const targetTurretAngle = Math.atan2(battleState.mouse.y - player.y, battleState.mouse.x - player.x);
        player.turretAngle = rotateAngleToward(
          player.turretAngle,
          targetTurretAngle,
          player.turretTurnSpeed * delta
        );
      } else {
        player.turretAngle = player.angle;
      }
    }

    function updateBotTank(bot, delta) {
      bot.botTurnTimer -= delta;

      if (bot.botTurnTimer <= 0) {
        bot.botTurnTimer = 0.8 + Math.random() * 1.2;
        bot.angle += (Math.random() - 0.5) * 1.2;
      }

      if (!moveTank(bot, bot.speed * delta)) {
        bot.angle += Math.PI / 2 + Math.random() * Math.PI / 2;
      }

      bot.turretAngle = bot.angle;
    }

    function updateBattle(delta) {
      updatePlayerTank(delta);
      battleState.allies
        .filter((tank) => tank.isBot)
        .forEach((tank) => updateBotTank(tank, delta));
      battleState.enemies.forEach((tank) => updateBotTank(tank, delta));
      battleState.camera.x = Math.max(0, Math.min(
        battleState.player.x - battleCanvas.clientWidth / 2,
        battleState.mapWidth - battleCanvas.clientWidth
      ));
      battleState.camera.y = Math.max(0, Math.min(
        battleState.player.y - battleCanvas.clientHeight / 2,
        battleState.mapHeight - battleCanvas.clientHeight
      ));
    }

    function drawBattleMap(ctx) {
      ctx.fillStyle = "#49643a";
      ctx.fillRect(0, 0, battleState.mapWidth, battleState.mapHeight);

      ctx.fillStyle = "rgba(70, 112, 54, 0.6)";
      for (let x = 0; x < battleState.mapWidth; x += 160) {
        for (let y = 0; y < battleState.mapHeight; y += 120) {
          ctx.fillRect(x + 20, y + 30, 60, 16);
        }
      }

      ctx.fillStyle = "#2d78a4";
      battleState.rivers.forEach((river) => {
        ctx.beginPath();
        ctx.roundRect(river.x, river.y, river.width, river.height, 38);
        ctx.fill();
      });

      battleState.rocks.forEach((rock) => {
        ctx.fillStyle = "#4d4c45";
        ctx.beginPath();
        ctx.arc(rock.x, rock.y, rock.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#66645d";
        ctx.beginPath();
        ctx.arc(rock.x - rock.radius * 0.2, rock.y - rock.radius * 0.25, rock.radius * 0.42, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawTankPart(ctx, image, width, height, fallbackColor) {
      if (image.complete && image.naturalWidth > 0) {
        ctx.drawImage(image, -width / 2, -height / 2, width, height);
        return;
      }

      ctx.fillStyle = fallbackColor;
      ctx.fillRect(-width / 2, -height / 2, width, height);
      ctx.strokeStyle = "#111";
      ctx.lineWidth = 3;
      ctx.strokeRect(-width / 2, -height / 2, width, height);
    }

    function drawBattleTank(ctx, tank, color) {
      ctx.save();
      ctx.translate(tank.x, tank.y);
      ctx.rotate(tank.angle);
      drawTankPart(ctx, tank.bodyImage, 78, 48, color);
      ctx.restore();

      ctx.save();
      ctx.translate(tank.x, tank.y);
      ctx.rotate(tank.turretAngle);
      drawTankPart(ctx, tank.turretImage, 58, 34, color);
      ctx.fillStyle = "#202020";
      ctx.fillRect(8, -5, 48, 10);
      ctx.restore();
    }

    function renderBattle() {
      const ctx = battleContext;

      ctx.clearRect(0, 0, battleCanvas.clientWidth, battleCanvas.clientHeight);
      ctx.save();
      ctx.translate(-battleState.camera.x, -battleState.camera.y);
      drawBattleMap(ctx);
      battleState.enemies.forEach((tank) => drawBattleTank(ctx, tank, "#7b3434"));
      battleState.allies.forEach((tank) => drawBattleTank(ctx, tank, tank === battleState.player ? "#3d5f2c" : "#2f5f7c"));
      ctx.restore();
    }

    function battleLoop(time) {
      if (!battleState.active) {
        return;
      }

      const delta = Math.min(0.05, (time - battleState.lastTime) / 1000 || 0);

      battleState.lastTime = time;
      updateBattle(delta);
      renderBattle();
      battleState.animationFrame = requestAnimationFrame(battleLoop);
    }

    function startBattle() {
      const playerTank = findLoadedTankByReference(selectedTank);
      const battlePool = loadedTanks.filter((tank) => tank.name !== playerTank.name);
      const pickTank = (index) => battlePool[index % battlePool.length] || fallbackTanks[index % fallbackTanks.length];

      closeOverlay();
      battleView.style.display = "block";
      resizeBattleCanvas();
      battleState.rocks = createBattleRocks();
      battleState.player = createBattleTank(playerTank, 320, battleState.mapHeight - 320, -Math.PI / 4, false, "ally");
      battleState.allies = [
        battleState.player,
        createBattleTank(pickTank(0), 220, battleState.mapHeight - 470, -Math.PI / 5, true, "ally"),
        createBattleTank(pickTank(1), 470, battleState.mapHeight - 220, -Math.PI / 3, true, "ally")
      ];
      battleState.enemies = [
        createBattleTank(pickTank(2), battleState.mapWidth - 340, 320, Math.PI * 0.75, true, "enemy"),
        createBattleTank(pickTank(3), battleState.mapWidth - 520, 230, Math.PI * 0.8, true, "enemy"),
        createBattleTank(pickTank(4), battleState.mapWidth - 220, 500, Math.PI * 0.65, true, "enemy")
      ];
      battleState.mouse.x = battleState.player.x + Math.cos(battleState.player.turretAngle) * 200;
      battleState.mouse.y = battleState.player.y + Math.sin(battleState.player.turretAngle) * 200;
      battleState.active = true;
      battleState.lastTime = performance.now();
      battleState.animationFrame = requestAnimationFrame(battleLoop);
    }

    function stopBattle() {
      battleState.active = false;
      cancelAnimationFrame(battleState.animationFrame);
      battleView.style.display = "none";
      battleState.allies = [];
      battleState.enemies = [];
      battleState.player = null;
      pressedKeys.clear();
    }

    window.addEventListener("keydown", (event) => {
      if (!battleState.active) {
        return;
      }

      const key = event.key.toLowerCase();

      if (["w", "a", "s", "d", "ц", "ф", "ы", "в"].includes(key)) {
        event.preventDefault();
        pressedKeys.add(key);
      }
    });

    window.addEventListener("keyup", (event) => {
      pressedKeys.delete(event.key.toLowerCase());
    });

    battleView.addEventListener("pointermove", (event) => {
      if (!battleState.active) {
        return;
      }

      const rect = battleCanvas.getBoundingClientRect();

      battleState.mouse.x = event.clientX - rect.left + battleState.camera.x;
      battleState.mouse.y = event.clientY - rect.top + battleState.camera.y;
    });

    window.addEventListener("resize", () => {
      if (battleState.active) {
        resizeBattleCanvas();
      }
    });

    battleBackButton.addEventListener("click", stopBattle);

    async function startGame() {
      setBackground("./img/angar.png");
      game.classList.add("playing");
      loadPlayerResources();

      loadedTanks = await loadTankRows();
      const availableTanks = loadedTanks.filter((tank) => tank.state === 2);
      selectedTank = availableTanks[0] || fallbackTanks[0];
      statsPanel.textContent = selectedTank.name;
      setTankImage(hangarTank, selectedTank.name);
      renderTopBar();
      renderSideButtons();
      renderTankBar(loadedTanks);
    }

    function showNextLoadingFrame() {
      setBackground(loadingFrames[frameIndex]);
      shownFrames += 1;
      frameIndex = (frameIndex + 1) % loadingFrames.length;

      if (shownFrames >= totalFrames) {
        setTimeout(startGame, frameDelay);
        return;
      }

      setTimeout(showNextLoadingFrame, frameDelay);
    }

    showNextLoadingFrame();
  </script>
</body>
</html>
