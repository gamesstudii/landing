plugins {
    id "com.android.application"
}

def releaseStoreFile = System.getenv("TANKSWARS_KEYSTORE")
def releaseStorePassword = System.getenv("TANKSWARS_STORE_PASSWORD")
def releaseKeyPassword = System.getenv("TANKSWARS_KEY_PASSWORD")

android {
    namespace "com.tankswars.game"
    compileSdk 35

    signingConfigs {
        release {
            if (releaseStoreFile && releaseStorePassword && releaseKeyPassword) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias "tankswars"
                keyPassword releaseKeyPassword
            }
        }
    }

    defaultConfig {
        applicationId "com.tankswars.game"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.release
        }
    }
}
