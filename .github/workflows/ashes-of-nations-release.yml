name: Publish Ashes Of Nations installer

on:
  push:
    tags:
      - "ashes-of-nations-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: downloads/ashes-of-nations-setup-0.1.0.exe
