<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новость</title>
    <link rel="stylesheet" href="../styles/root.css">
    <link rel="stylesheet" href="../styles/news.css">
</head>
<body>
    <div id="header-slot"></div>
    <div id="News" class="page">
        <div id="title">Загрузка...</div>
        <div id="text"></div>
    </div>

    <script>
        const newsTitle = document.getElementById("title");
        const newsText = document.getElementById("text");

        fetch("../Modules/News.txt")
            .then((response) => {
                if (!response.ok) {
                    throw new Error("Файл новостей не найден.");
                }
                return response.text();
            })
            .then((content) => {
                const parts = content.split("~");
                const title = parts[1] ? parts[1].trim() : "Вторая часть не найдена";
                const text = parts[2] ? parts[2].trim() : "Третья часть не найдена";

                newsTitle.textContent = title;
                newsText.textContent = text;
            })
            .catch((error) => {
                newsTitle.textContent = "Ошибка загрузки";
                newsText.textContent = error.message;
            });
    </script>
    <div id="footer-slot"></div>
    <script src="../modules/layout.js"></script>
</body>
</html>
