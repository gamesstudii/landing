<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры | Games Studio</title>
    <link rel="icon" type="image/png" href="../Games Studio.png">
    <link rel="stylesheet" href="../styles/root.css">
    <link rel="stylesheet" href="../styles/store.css">
</head>
<body>
    <div id="header-slot"></div>
    <main class="page-shell">
        <section class="store-head card">
            <p class="label">Игры</p>
            <h1 class="section-title">Каталог Games Studio</h1>
            <p class="section-lead">Выбери игру, открой страницу с описанием или запусти сразу. Сейчас в каталоге три проекта.</p>
        </section>

        <section class="store-toolbar card" aria-label="Фильтры каталога">
            <div class="field">
                <label for="store-search">Поиск</label>
                <input id="store-search" type="search" placeholder="Например: танки, стратегия">
            </div>
            <div class="field">
                <label for="genre-filter">Жанр</label>
                <select id="genre-filter">
                    <option value="all">Все</option>
                    <option value="strategy">Стратегия</option>
                    <option value="tanks">Танки</option>
                </select>
            </div>
            <div class="field">
                <label for="platform-filter">Платформа</label>
                <select id="platform-filter">
                    <option value="all">Все</option>
                    <option value="browser">Браузер</option>
                    <option value="pc">ПК</option>
                </select>
            </div>
        </section>

        <section id="store-grid" class="store-grid" aria-live="polite"></section>
        <div id="store-empty" class="store-empty">Ничего не найдено.</div>
    </main>
    <div id="footer-slot"></div>
    <script src="../modules/layout.js"></script>
    <script src="../modules/store.js"></script>
</body>
</html>
