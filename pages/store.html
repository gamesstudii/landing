<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин</title>
    <link rel="stylesheet" href="../styles/root.css">
    <link rel="stylesheet" href="../styles/store.css">
</head>
<body>
    <div id="header-slot"></div>
    <div id="GSstore" class="page">
        <div>GSstore</div>

        <section id="games-studio" class="studio-card">
            <div class="studio-header">
                <h2>Games Studio</h2>
                <span class="studio-label">Основная студия</span>
            </div>
            <div class="game-list">
                <a class="game-link" href="./tankswars/index.html">
                    <span class="game-title">Tanks Wars</span>
                    <span class="game-action">Играть</span>
                </a>
            </div>
        </section>

        <section id="your-nightmare-studio" class="studio-card">
            <div class="studio-header">
                <h2>Your Nightmare Studio</h2>
                <span class="studio-label">Скоро</span>
            </div>
            <p class="empty-state">Игры этой студии появятся позже.</p>
        </section>

        <section id="russia-games" class="studio-card">
            <div class="studio-header">
                <h2>Игры России</h2>
                <span class="studio-label">Скоро</span>
            </div>
            <p class="empty-state">Игры этой студии появятся позже.</p>
        </section>
    </div>
    <div id="footer-slot"></div>
    <script src="../modules/layout.js"></script>
</body>
</html>
